<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tap to Load More - Mockup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'v3-primary': '#4F46E5',
            'v3-primary-light': '#EEF2FF',
            'v3-text-muted': '#6B7280',
            'v3-bg-muted': '#F9FAFB',
          }
        }
      }
    }
  </script>
  <style>
    /* Ball bounce animation - drops fast, bounces with decay */
    @keyframes ball-bounce {
      0%, 100% {
        transform: translateY(0);
        animation-timing-function: ease-out;
      }
      20% {
        transform: translateY(8px);
        animation-timing-function: ease-in;
      }
      35% {
        transform: translateY(0);
        animation-timing-function: ease-out;
      }
      50% {
        transform: translateY(4px);
        animation-timing-function: ease-in;
      }
      65% {
        transform: translateY(0);
        animation-timing-function: ease-out;
      }
      75% {
        transform: translateY(2px);
        animation-timing-function: ease-in;
      }
      85% {
        transform: translateY(0);
      }
    }
    .animate-ball-bounce {
      animation: ball-bounce 1s ease-out infinite;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-lg font-bold mb-4 text-center">계약서 목록</h1>

    <!-- List Container -->
    <div class="relative bg-v3-bg-muted rounded-[28px] overflow-hidden">
      <!-- Items -->
      <div class="p-4 space-y-2">
        <!-- Item 1 -->
        <div class="flex items-center gap-3 p-4 rounded-[18px] bg-white border-2 border-transparent shadow-sm">
          <div class="w-11 h-11 rounded-[14px] shadow-md bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <span class="font-bold text-[0.85rem]">김철수</span>
            <div class="text-[0.7rem] text-v3-text-muted">근로계약서 (2024년)</div>
          </div>
          <span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">완료</span>
        </div>

        <!-- Item 2 -->
        <div class="flex items-center gap-3 p-4 rounded-[18px] bg-white border-2 border-transparent shadow-sm">
          <div class="w-11 h-11 rounded-[14px] shadow-md bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <span class="font-bold text-[0.85rem]">이영희</span>
            <div class="text-[0.7rem] text-v3-text-muted">재직증명서</div>
          </div>
          <span class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-700">진행중</span>
        </div>

        <!-- Item 3 -->
        <div class="flex items-center gap-3 p-4 rounded-[18px] bg-white border-2 border-transparent shadow-sm">
          <div class="w-11 h-11 rounded-[14px] shadow-md bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <span class="font-bold text-[0.85rem]">박민수</span>
            <div class="text-[0.7rem] text-v3-text-muted">급여명세서 (1월)</div>
          </div>
          <span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">완료</span>
        </div>

        <!-- Item 4 (starts to blur) -->
        <div class="flex items-center gap-3 p-4 rounded-[18px] bg-white border-2 border-transparent shadow-sm opacity-70">
          <div class="w-11 h-11 rounded-[14px] shadow-md bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <span class="font-bold text-[0.85rem]">정수진</span>
            <div class="text-[0.7rem] text-v3-text-muted">퇴직금 정산서</div>
          </div>
          <span class="px-2 py-1 text-xs rounded-full bg-gray-100 text-gray-700">대기</span>
        </div>

        <!-- Item 5 (more blurred) -->
        <div class="flex items-center gap-3 p-4 rounded-[18px] bg-white border-2 border-transparent shadow-sm opacity-40">
          <div class="w-11 h-11 rounded-[14px] shadow-md bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <span class="font-bold text-[0.85rem]">최동욱</span>
            <div class="text-[0.7rem] text-v3-text-muted">연봉계약서</div>
          </div>
          <span class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-700">진행중</span>
        </div>

        <!-- Item 6 (heavily blurred) -->
        <div class="flex items-center gap-3 p-4 rounded-[18px] bg-white border-2 border-transparent shadow-sm opacity-15">
          <div class="w-11 h-11 rounded-[14px] shadow-md bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center">
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
          </div>
          <div class="flex-1 min-w-0">
            <span class="font-bold text-[0.85rem]">한미영</span>
            <div class="text-[0.7rem] text-v3-text-muted">입사지원서</div>
          </div>
          <span class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-700">완료</span>
        </div>
      </div>

      <!-- Gradient Blur Overlay - starts from item 4, more prominent -->
      <div class="absolute inset-x-0 bottom-0 h-56 bg-gradient-to-t from-v3-bg-muted from-30% via-v3-bg-muted/80 via-60% to-transparent pointer-events-none"></div>

      <!-- Tap Button -->
      <button onclick="loadMore()" class="absolute inset-x-0 bottom-6 flex flex-col items-center gap-1 text-v3-text-muted text-sm hover:text-v3-primary transition-colors">
        <span>탭하여 더 보기</span>
        <svg class="w-5 h-5 animate-ball-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>
    </div>

    <p class="text-center text-xs text-gray-400 mt-4">
      총 24개 중 6개 표시
    </p>
  </div>

  <script>
    function loadMore() {
      alert('더 많은 계약서를 불러옵니다...\n(실제 구현에서는 20개 추가 로드)');
    }
  </script>
</body>
</html>
