function AdminExample(){
  const ref = React.useRef(null);
  const [scale, setScale] = React.useState(0.6);
  React.useEffect(()=>{
    const ro = new ResizeObserver(()=>{ if(ref.current) setScale(ref.current.clientWidth/1440); });
    if(ref.current) ro.observe(ref.current);
    return ()=>ro.disconnect();
  },[]);
  return <div>
    <p style={{margin:"0 0 12px"}}><a href="../ui_kits/admin/index.html" target="_blank" style={{fontSize:"var(--text-md)",fontWeight:600}}>새 탭에서 열기 ↗</a></p>
    <div ref={ref} style={{width:"100%", height:900*scale, overflow:"hidden", borderRadius:"var(--radius-lg)", border:"1px solid var(--border)"}}>
      <iframe src="../ui_kits/admin/index.html" style={{width:1440, height:900, border:"none", transform:"scale("+scale+")", transformOrigin:"top left"}}/>
    </div>
  </div>;
}

/* ============ anatomy helpers ============ */
const LVL = {
  organism:{color:"var(--primary)", label:"Organism — 화면 블록"},
  molecule:{color:"var(--status-warning-fg)", label:"Molecule — 조립 단위"},
  atom:{color:"var(--status-success-fg)", label:"Atom — 최소 단위"},
};
function Anno({level, name, block, right, children, style}){
  const l = LVL[level];
  return <div style={{position:"relative", display:block?"block":"inline-flex", outline:"1.5px dashed "+l.color, outlineOffset:5, borderRadius:"var(--radius-sm)", ...style}}>
    <span style={{position:"absolute", top:-17, ...(right?{right:-6}:{left:-6}), zIndex:6, fontSize:"var(--text-2xs)", fontWeight:700, fontFamily:"var(--font-mono)", lineHeight:1, background:l.color, color:"#fff", padding:"3px 7px", borderRadius:"var(--radius-pill)", whiteSpace:"nowrap"}}>{name}</span>
    {children}
  </div>;
}
function AnatomyLegend(){
  return <div style={{display:"flex", gap:10, flexWrap:"wrap", marginBottom:20}}>
    {Object.entries(LVL).map(([k,l]) => <span key={k} style={{display:"inline-flex", alignItems:"center", gap:7, fontSize:"var(--text-xs)", fontWeight:600, color:"var(--text)", background:"var(--surface)", borderRadius:"var(--radius-pill)", padding:"6px 13px"}}><span style={{width:8, height:8, borderRadius:"50%", background:l.color, flexShrink:0}}/>{l.label}</span>)}

function AnatomyCard(){

function AnatomyTree(){
  const C = (lv,t) => <span style={{color:LVL[lv].color, fontWeight:700}}>{t}</span>;
  const M = (t) => <span style={{color:"var(--text-muted)"}}>{t}</span>;
  return <pre style={{background:"var(--surface)", borderRadius:"var(--radius-md)", padding:"16px 20px", fontSize:"var(--text-sm)", fontFamily:"var(--font-mono)", color:"var(--dark)", lineHeight:2, margin:"0 0 28px", overflowX:"auto"}}>
{C("organism","Card")}{M("  — 셸: radius·shadow·padding만 담당")}{"\n"}
{"├─ header "}{M("(flex glue — raw markup은 레이아웃만)")}{"\n"}
{"│   ├─ "}{C("atom","Avatar")}{"\n"}
{"│   ├─ name / phone "}{M("(content)")}{"\n"}
{"│   └─ "}{C("atom","StatusBadge")}{"\n"}
{"├─ "}{C("molecule","DetailActions")}{M("  — 내부: pill button atoms")}{"\n"}

function OrganismTable(){
  const rows = [

function InfiniteDemo(){
  const NAMES = ["김서연","박지호","이하은","최민준","정수아","강도윤","윤채원","임시우"];
  const all = React.useMemo(()=>Array.from({length:32},(_,i)=>({id:i, name:NAMES[i%8], phone:"010-12"+String(3400+i).padStart(4,"0"), status:["active","pending","signed"][i%3]})),[]);
  const [filter,setFilter]=React.useState("all");
  const [loading,setLoading]=React.useState(false);
  const rows = filter==="all" ? all : all.filter(r=>r.status==="active");
  const inf = B.useListInfiniteScroll({ resetKey: filter, totalItems: rows.length });
  return <div style={{height:420, width:380, maxWidth:"100%"}}>
    <B.ListPanel title="고객" subtitle={rows.length+"명"}
      tabs={[{key:"all",label:"전체"},{key:"active",label:"진행중"}]} activeTab={filter} onTabChange={setFilter}
      isLoading={loading} contentSkeleton={<B.ListSkeleton rows={6}/>} contentRef={inf.scrollContainerRef}
      headerActions={<B.HeaderActionButton variant="muted" label={loading?"로딩 끄기":"로딩 보기"} onClick={()=>setLoading(!loading)}/>}>
      <div style={{display:"grid", gap:14}}>
        {rows.slice(0, inf.visibleCount).map(c=>
          <div key={c.id} data-list-row style={{display:"flex",alignItems:"center",gap:12}}>
            <B.Avatar name={c.name} size="sm"/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:"var(--text-md)",fontWeight:600,color:"var(--dark)"}}>{c.name}</div>
              <div style={{fontSize:"var(--text-xs)",color:"var(--text-muted)"}}>{c.phone}</div>
            </div>
            <B.StatusBadge status={c.status}/>
          </div>)}
        {inf.hasMore && (inf.isInitialLoad
          ? <B.Button variant="subtle" size="sm" fullWidth onClick={inf.loadMore}>탭하여 더보기</B.Button>
          : <div ref={inf.sentinelRef}><B.ListSkeleton rows={2}/></div>)}
      </div>
    </B.ListPanel>
  </div>;
}

  {id:"card-anatomy", title:"Card Layers", desc:"카드는 셸일 뿐 — 간격은 슬롯이 소유합니다. Header / Body / Footer 3밴드로 나뉘며, 각 밴드의 규격은 개별 페이지에 있습니다. 데스크톱↔모바일 토글로 밀도가 바뀝니다.", body:()=><div>
    <CardAnatomyDemo/>
    <B.Alert variant="info" title="slotted 규칙">Header/Body/Footer를 쓸 땐 반드시 <code>Card slotted</code> — 셸의 기본 padding을 끄고 overflow를 클립해 슬롯이 간격을 온전히 소유합니다. 단순 카드는 그대로 <code>padding</code>.</B.Alert>
    <H2>3밴드 요약</H2>
    <Tbl head={["밴드","padding (데스크톱 / 모바일)","페이지"]} rows={[
      ["CardHeader","20·20·16 / 16·16·14",<a href="#cardheader">CardHeader →</a>],
      ["CardBody","20 / 16",<a href="#cardbody">CardBody →</a>],
      ["CardFooter","16·20 / 14·16",<a href="#cardfooter">CardFooter →</a>]]}/>
    <H2>전체 조립</H2>
    <Code>{'<Card slotted variant="content">\n  <CardHeader title="김서연" subtitle="010-1234-5678"\n    trailing={<StatusBadge status="active"/>}/>\n  <CardBody>\n    <InfoRow label="출산 예정일" value="2026-08-15"/>\n    <InfoRow label="담당 관리사" value="박관리사"/>\n  </CardBody>\n  <CardFooter>\n    <Button variant="neutral" height="sm">수정</Button>\n    <Button height="sm">계약 발송</Button>\n  </CardFooter>\n</Card>'}</Code>
    <Props rows={[["Card.slotted","boolean","","슬롯 조립 모드 — 외곽 padding 제거"]]}/>
  </div>},
  {id:"cardheader", title:"CardHeader", desc:"카드 상단 밴드 — 완전 규격화. 크기·굵기·색·padding·divider가 전부 고정이고, props로는 글자 내용(title·subtitle)과 우측 trailing 슬롯만 받습니다.", body:()=><div>
    <BandDemo band="header"/>
    <B.Alert variant="info" title="하나의 헤더로 통일">repo에 흩어진 헤더(대시보드 CardTitle · content-paper · PageHeader · 인증 패널 · 위저드 h3)를 이 컴포넌트 하나로 흡수합니다. size·색·굵기 노브는 없습니다 — 어디서든 동일한 모습.</B.Alert>
    <H2>고정 규격</H2>
    <Tbl head={["항목","고정 값"]} rows={[
      ["padding","20·20·16 (상·좌우·하) · 모바일 16·16·14"],

const FLAT = PAGES.flatMap(g => g.pages.map(p => ({...p, group:g.group})));

function App(){
  const initial = (location.hash || "#intro").slice(1);
  const [pid, setPid] = React.useState(FLAT.some(p=>p.id===initial) ? initial : "intro");
  const [q, setQ] = React.useState("");
  const [mode, setMode] = React.useState("desktop");
  const mainRef = React.useRef(null);
  React.useEffect(()=>{
    const onHash = () => { const id = location.hash.slice(1); if (FLAT.some(p=>p.id===id)) setPid(id); };
    window.addEventListener("hashchange", onHash);
    return ()=>window.removeEventListener("hashchange", onHash);
  },[]);
  const go = (id) => { location.hash = id; setPid(id); if(mainRef.current) mainRef.current.scrollTop = 0; };
  const page = FLAT.find(p=>p.id===pid) || FLAT[0];
  const ql = q.trim().toLowerCase();
  return (
    <ViewCtx.Provider value={mode}>
    <div style={{display:"flex", height:"100%", background:"var(--background)"}}>
      <aside className="doc-side">
        <div style={{display:"flex", alignItems:"center", gap:10, padding:"0 8px 16px"}}>
          <img src="../assets/logo.svg" style={{width:36, height:36, borderRadius:"var(--radius-md)"}} alt=""/>
          <div>
            <div style={{fontSize:"var(--text-base)", fontWeight:700, color:"var(--dark)"}}>아가잼잼 관리자</div>
            <div style={{fontSize:"var(--text-2xs)", color:"var(--text-muted)", letterSpacing:"0.1em", textTransform:"uppercase"}}>Design System</div>
          </div>
        </div>
        <B.Input pill placeholder="컴포넌트 검색..." value={q} onChange={(e)=>setQ(e.target.value)} style={{height:34, fontSize:"var(--text-sm)"}}/>
        <div style={{display:"flex", gap:4, background:"var(--surface)", borderRadius:"var(--radius-pill)", padding:4, margin:"10px 0 2px"}}>
          {[["desktop","데스크톱"],["mobile","모바일"]].map(([m,l]) =>
            <button key={m} onClick={()=>setMode(m)} style={{flex:1, border:"none", cursor:"pointer", fontFamily:"var(--font-sans)", fontWeight:600, fontSize:"var(--text-xs)", padding:"6px 0", borderRadius:"var(--radius-pill)", background:mode===m?"var(--card)":"transparent", color:mode===m?"var(--primary)":"var(--text-muted)", boxShadow:mode===m?"var(--shadow-content)":"none", transition:"all 200ms var(--ease-standard)"}}>{l}</button>)}
        </div>
        {PAGES.map(g => {
          const items = g.pages.filter(p => !ql || p.title.toLowerCase().includes(ql) || p.id.includes(ql));
          if (!items.length) return null;
          return <div key={g.group}>
            <div className="doc-group">{g.group}</div>
            {items.map(p => <button key={p.id} className={"doc-navitem" + (p.id===pid ? " active" : "")} onClick={()=>go(p.id)}>{p.title}</button>)}
          </div>;
        })}
      </aside>
      <main className="doc-main" ref={mainRef}>
        <div style={{maxWidth:820}}>
          <div style={{fontSize:"var(--text-2xs)", fontWeight:600, letterSpacing:"0.13em", textTransform:"uppercase", color:"var(--text-muted)", marginBottom:8}}>{page.group}</div>
          <h1 style={{fontSize:"var(--text-3xl)", fontWeight:800, color:"var(--dark)", margin:"0 0 8px", letterSpacing:"-0.01em"}}>{page.title}</h1>
          <p style={{fontSize:"var(--text-base)", color:"var(--text)", lineHeight:1.7, margin:"0 0 28px", maxWidth:"68ch"}}>{page.desc}</p>
          {page.body()}
        </div>
      </main>
    </div>
    </ViewCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
