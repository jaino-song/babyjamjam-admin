<!-- @dsCard group="Colors" name="Dark Mode" viewport="700x400" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Dark Mode</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:24px;background:var(--background);margin:0;}
.sw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sw{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-content);background:var(--card);}
.sw__chip{height:64px;}
.sw__meta{padding:10px 12px;}
.sw__name{font-size:var(--text-sm);font-weight:700;color:var(--dark);}
.sw__val{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);}
h2.sec{font-size:var(--text-xs);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px;}
h2.sec:first-child{margin-top:0;}
</style></head><body>
<h2 class="sec">.dark class re-maps every token</h2><div class="dark" style="background:var(--background);border-radius:20px;padding:20px;display:grid;gap:12px;"><div style="display:flex;gap:10px;"><div style="flex:1;"><div style="height:44px;border-radius:var(--radius-md);background:var(--card);"></div><div style="font-size:0.6rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:4px;">--card</div></div><div style="flex:1;"><div style="height:44px;border-radius:var(--radius-md);background:var(--surface);"></div><div style="font-size:0.6rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:4px;">--surface</div></div><div style="flex:1;"><div style="height:44px;border-radius:var(--radius-md);background:var(--primary);"></div><div style="font-size:0.6rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:4px;">--primary</div></div><div style="flex:1;"><div style="height:44px;border-radius:var(--radius-md);background:var(--primary-light);"></div><div style="font-size:0.6rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:4px;">--primary-light</div></div><div style="flex:1;"><div style="height:44px;border-radius:var(--radius-md);background:var(--border);"></div><div style="font-size:0.6rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:4px;">--border</div></div></div><div style="background:var(--card);border-radius:16px;box-shadow:var(--shadow-card);padding:16px;display:flex;align-items:center;justify-content:space-between;"><div><div style="color:var(--dark);font-weight:700;">김서연</div><div style="color:var(--text-muted);font-size:var(--text-sm);">010-1234-5678</div></div><span style="display:inline-flex;border-radius:999px;border:1px solid var(--status-info-border);background:var(--status-info-bg);color:var(--status-info-fg);padding:4px 12px;font-size:var(--text-2xs);font-weight:600;">진행중</span></div></div><p style="font-size:var(--text-md);color:var(--text);max-width:60ch;">Components never hard-code colors, so dark mode is free: toggle <code>.dark</code> on the root. Accent -light tints and status triads have dedicated dark values.</p>
</body></html>
