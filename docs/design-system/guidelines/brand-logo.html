<!-- @dsCard group="Brand" name="Logo & Lockup" viewport="700x360" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Brand</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:24px;background:var(--background);margin:0;}
.sw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sw{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-content);background:var(--card);}
.sw__chip{height:64px;}
.sw__meta{padding:10px 12px;}
.sw__name{font-size:var(--text-sm);font-weight:700;color:var(--dark);}
.sw__val{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);}
h2.sec{font-size:var(--text-xs);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px;}
h2.sec:first-child{margin-top:0;}
</style></head><body>
<h2 class="sec">아가잼잼 brand mark</h2><div style="display:flex;gap:20px;align-items:center;background:var(--card);border-radius:16px;box-shadow:var(--shadow-content);padding:20px;"><img src="../assets/logo.svg" style="width:72px;height:72px;border-radius:20px;box-shadow:var(--shadow-content);" alt="아가잼잼"><img src="../assets/logo.svg" style="width:48px;height:48px;border-radius:16px;" alt=""><img src="../assets/logo.svg" style="width:32px;height:32px;border-radius:10px;" alt=""><div style="margin-left:auto;display:flex;align-items:center;gap:12px;"><img src="../assets/logo.svg" style="width:48px;height:48px;border-radius:16px;" alt=""><span style="font-size:var(--text-xl);font-weight:700;color:var(--dark);letter-spacing:-0.01em;">아가잼잼 관리자</span></div></div><p style="font-size:var(--text-md);color:var(--text);max-width:62ch;">Sidebar lockup: 48px logo with --radius-lg clip + 1.25rem/700 wordmark. The logo is the only illustration in the admin — no decorative imagery elsewhere. Shared with the marketing site; admin stays utilitarian (no peach accent, no Paperlogy).</p>
</body></html>
