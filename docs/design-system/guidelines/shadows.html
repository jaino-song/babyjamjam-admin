<!-- @dsCard group="Spacing" name="Elevation" viewport="700x340" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:24px;background:var(--background);margin:0;}
.sw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sw{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-content);background:var(--card);}
.sw__chip{height:64px;}
.sw__meta{padding:10px 12px;}
.sw__name{font-size:var(--text-sm);font-weight:700;color:var(--dark);}
.sw__val{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);}
h2.sec{font-size:var(--text-xs);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px;}
h2.sec:first-child{margin-top:0;}
</style></head><body>
<h2 class="sec">Navy-tinted soft shadows — cards have no borders</h2><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:8px;"><div style="background:var(--card);border-radius:16px;box-shadow:var(--shadow-content);padding:16px;height:64px;display:flex;flex-direction:column;justify-content:center;"><div style="font-size:var(--text-xs);font-weight:700;color:var(--dark);">--shadow-content</div><div style="font-size:0.62rem;color:var(--text-muted);">list rows, inner cards</div></div><div style="background:var(--card);border-radius:16px;box-shadow:var(--shadow-card);padding:16px;height:64px;display:flex;flex-direction:column;justify-content:center;"><div style="font-size:var(--text-xs);font-weight:700;color:var(--dark);">--shadow-card</div><div style="font-size:0.62rem;color:var(--text-muted);">default cards, panels</div></div><div style="background:var(--card);border-radius:16px;box-shadow:var(--shadow-hover);padding:16px;height:64px;display:flex;flex-direction:column;justify-content:center;"><div style="font-size:var(--text-xs);font-weight:700;color:var(--dark);">--shadow-hover</div><div style="font-size:0.62rem;color:var(--text-muted);">lift on hover (-4px)</div></div><div style="background:var(--card);border-radius:16px;box-shadow:var(--shadow-popover);padding:16px;height:64px;display:flex;flex-direction:column;justify-content:center;"><div style="font-size:var(--text-xs);font-weight:700;color:var(--dark);">--shadow-popover</div><div style="font-size:0.62rem;color:var(--text-muted);">menus, selects</div></div><div style="background:var(--card);border-radius:16px;box-shadow:var(--shadow-float);padding:16px;height:64px;display:flex;flex-direction:column;justify-content:center;"><div style="font-size:var(--text-xs);font-weight:700;color:var(--dark);">--shadow-float</div><div style="font-size:0.62rem;color:var(--text-muted);">dialogs</div></div></div>
</body></html>
