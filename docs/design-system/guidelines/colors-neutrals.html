<!-- @dsCard group="Colors" name="Neutrals & Text" viewport="700x440" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Neutrals & Text</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:24px;background:var(--background);margin:0;}
.sw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sw{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-content);background:var(--card);}
.sw__chip{height:64px;}
.sw__meta{padding:10px 12px;}
.sw__name{font-size:var(--text-sm);font-weight:700;color:var(--dark);}
.sw__val{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);}
h2.sec{font-size:var(--text-xs);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px;}
h2.sec:first-child{margin-top:0;}
</style></head><body>
<h2 class="sec">Surfaces</h2><div class="sw-grid"><div class="sw"><div class="sw__chip" style="background:var(--background);border-bottom:1px solid var(--border);"></div><div class="sw__meta"><div class="sw__name">Background</div><div class="sw__val">--background</div></div></div><div class="sw"><div class="sw__chip" style="background:var(--card);border-bottom:1px solid var(--border);"></div><div class="sw__meta"><div class="sw__name">Card</div><div class="sw__val">--card</div></div></div><div class="sw"><div class="sw__chip" style="background:var(--surface);"></div><div class="sw__meta"><div class="sw__name">Surface (inset)</div><div class="sw__val">--surface</div></div></div><div class="sw"><div class="sw__chip" style="background:var(--muted);"></div><div class="sw__meta"><div class="sw__name">Muted</div><div class="sw__val">--muted</div></div></div><div class="sw"><div class="sw__chip" style="background:var(--border);"></div><div class="sw__meta"><div class="sw__name">Border</div><div class="sw__val">--border</div></div></div></div><h2 class="sec">Text hierarchy</h2><div style="background:var(--card);border-radius:16px;box-shadow:var(--shadow-content);padding:16px;display:grid;gap:8px;"><div style="color:var(--dark);font-weight:700;">--dark — 제목과 값 Headings & values</div><div style="color:var(--text);">--text — 본문 텍스트 Body text</div><div style="color:var(--text-muted);font-size:var(--text-md);">--text-muted — 라벨, 캡션 Labels & captions</div><div style="color:var(--muted-foreground);font-size:var(--text-md);">--muted-foreground — 테이블 셀, 부제목</div></div>
</body></html>
