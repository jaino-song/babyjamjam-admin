<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:24px;background:var(--background);margin:0;}
.sw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sw{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-content);background:var(--card);}
.sw__chip{height:64px;}
.sw__meta{padding:10px 12px;}
.sw__name{font-size:var(--text-sm);font-weight:700;color:var(--dark);}
.sw__val{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);}
h2.sec{font-size:var(--text-xs);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px;}
h2.sec:first-child{margin-top:0;}
</style></head><body>
<h2 class="sec">4px grid</h2><div style="background:var(--card);border-radius:16px;box-shadow:var(--shadow-content);padding:16px;display:grid;gap:8px;"><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-1</span><div style="height:14px;width:var(--space-1);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">4px</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-2</span><div style="height:14px;width:var(--space-2);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">8px</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-3</span><div style="height:14px;width:var(--space-3);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">12px</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-4</span><div style="height:14px;width:var(--space-4);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">16px</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-5</span><div style="height:14px;width:var(--space-5);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">20px</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-6</span><div style="height:14px;width:var(--space-6);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">24px</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-8</span><div style="height:14px;width:var(--space-8);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">32px</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-10</span><div style="height:14px;width:var(--space-10);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">40px</span></div><div style="display:flex;align-items:center;gap:12px;"><span style="width:90px;font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);">--space-12</span><div style="height:14px;width:var(--space-12);background:var(--primary);border-radius:3px;"></div><span style="font-size:var(--text-2xs);color:var(--text-muted);">48px</span></div></div><p style="font-size:var(--text-md);color:var(--text);max-width:60ch;">Cards pad 16–24px. Panel gap 24px. Chip/list gaps 8–12px. Sections stack with 24–32px.</p>
</body></html>
