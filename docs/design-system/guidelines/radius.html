<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Radius</title>

<style>body{padding:24px;background:var(--background);margin:0;}

.sw__chip{height:64px;}
.sw__meta{padding:10px 12px;}
.sw__name{font-size:0.75rem;font-weight:700;color:var(--dark);}
.sw__val{font-size:0.65rem;color:var(--text-muted);font-family:var(--font-mono);}
h2.sec{font-size:0.7rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px;}
h2.sec:first-child{margin-top:0;}
</style></head><body>
