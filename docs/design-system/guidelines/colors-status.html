<!-- @dsCard group="Colors" name="Status Triads" viewport="700x330" -->
<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><title>Status Triads</title>
<link rel="stylesheet" href="../styles.css">
<style>body{padding:24px;background:var(--background);margin:0;}
.sw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sw{border-radius:16px;overflow:hidden;box-shadow:var(--shadow-content);background:var(--card);}
.sw__chip{height:64px;}
.sw__meta{padding:10px 12px;}
.sw__name{font-size:var(--text-sm);font-weight:700;color:var(--dark);}
.sw__val{font-size:var(--text-2xs);color:var(--text-muted);font-family:var(--font-mono);}
h2.sec{font-size:var(--text-xs);font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin:20px 0 10px;}
h2.sec:first-child{margin-top:0;}
.badge{display:inline-flex;align-items:center;border-radius:999px;border:1px solid;padding:4px 12px;font-size:var(--text-2xs);font-weight:600;}</style></head><body>
<h2 class="sec">StatusBadge = tinted bg + tinted border + strong fg</h2><div style="display:flex;gap:10px;flex-wrap:wrap;"><span class="badge" style="background:var(--status-neutral-bg);border-color:var(--status-neutral-border);color:var(--status-neutral-fg);">대기 없음</span><span class="badge" style="background:var(--status-info-bg);border-color:var(--status-info-border);color:var(--status-info-fg);">진행중</span><span class="badge" style="background:var(--status-success-bg);border-color:var(--status-success-border);color:var(--status-success-fg);">서명완료</span><span class="badge" style="background:var(--status-warning-bg);border-color:var(--status-warning-border);color:var(--status-warning-fg);">대기</span><span class="badge" style="background:var(--status-danger-bg);border-color:var(--status-danger-border);color:var(--status-danger-fg);">일정 변경</span></div><h2 class="sec">Triads</h2><div class="sw-grid"><div class="sw"><div style="display:flex;height:48px;"><div style="flex:1;background:var(--status-neutral-bg);"></div><div style="flex:1;background:var(--status-neutral-border);"></div><div style="flex:1;background:var(--status-neutral-fg);"></div></div><div class="sw__meta"><div class="sw__name">neutral</div><div class="sw__val">--status-neutral-*</div></div></div><div class="sw"><div style="display:flex;height:48px;"><div style="flex:1;background:var(--status-info-bg);"></div><div style="flex:1;background:var(--status-info-border);"></div><div style="flex:1;background:var(--status-info-fg);"></div></div><div class="sw__meta"><div class="sw__name">info</div><div class="sw__val">--status-info-*</div></div></div><div class="sw"><div style="display:flex;height:48px;"><div style="flex:1;background:var(--status-success-bg);"></div><div style="flex:1;background:var(--status-success-border);"></div><div style="flex:1;background:var(--status-success-fg);"></div></div><div class="sw__meta"><div class="sw__name">success</div><div class="sw__val">--status-success-*</div></div></div><div class="sw"><div style="display:flex;height:48px;"><div style="flex:1;background:var(--status-warning-bg);"></div><div style="flex:1;background:var(--status-warning-border);"></div><div style="flex:1;background:var(--status-warning-fg);"></div></div><div class="sw__meta"><div class="sw__name">warning</div><div class="sw__val">--status-warning-*</div></div></div><div class="sw"><div style="display:flex;height:48px;"><div style="flex:1;background:var(--status-danger-bg);"></div><div style="flex:1;background:var(--status-danger-border);"></div><div style="flex:1;background:var(--status-danger-fg);"></div></div><div class="sw__meta"><div class="sw__name">danger</div><div class="sw__val">--status-danger-*</div></div></div></div>
</body></html>
