<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta http-equiv="Cache-Control" content="no-store"/>
<title>제공기록지 · 미리보기 목업 v3</title>
<style>
  :root{--bg:#eef1f6;--card:#fff;--ink:#1c2430;--muted:#7c8798;--line:#e4e8ef;--primary:#3b6fe0;--soft:#f3f6fb;--ok:#2faa6b;--lock:#9aa6b6;--warn:#c9803a;--shadow:0 10px 30px rgba(28,36,48,.12);}
  *{box-sizing:border-box} html,body{margin:0;height:100%}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",Roboto,"Segoe UI",sans-serif;color:var(--ink);display:flex;flex-direction:column;align-items:center;padding:18px 12px 40px}
  .ribbon{width:100%;max-width:440px;background:#fff7ec;border:1px solid #f0dcc0;color:var(--warn);font-size:12px;border-radius:10px;padding:7px 12px;margin-bottom:12px;text-align:center}
  .phone{width:100%;max-width:440px;background:var(--card);border-radius:26px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:760px}
  .top{background:#004aad;color:#fff;padding:16px 18px 14px}
  .top h1{font-size:15px;margin:0;font-weight:700;letter-spacing:-.2px}
  .top-meta{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:3px}
  .top .org{font-size:12px;opacity:.9}
  .top .crumbs{margin-left:auto;padding:0;color:rgba(255,255,255,.78)} .top .crumbs b{color:#fff}
  .bar{height:5px;background:rgba(255,255,255,.28);border-radius:99px;margin-top:12px;overflow:hidden} .bar>i{display:block;height:100%;background:#fff;border-radius:99px;width:5%;transition:width .35s}
  .crumbs{display:flex;gap:6px;align-items:center;font-size:11px;color:var(--muted);padding:10px 18px 0} .crumbs b{color:var(--ink)}
  .body{flex:1;padding:14px 18px 8px;overflow:auto}
  .body.completion-body{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
  .completion-icon{font-size:28px;line-height:1;margin-bottom:18px}
  .completion-title{margin:0;color:#004aad;font-size:20px;font-weight:700;letter-spacing:-.2px}
  .step-title{font-size:18px;font-weight:750;margin:6px 0;letter-spacing:-.3px} .step-sub{font-size:12.5px;color:var(--muted);margin-bottom:16px}
  .field{margin-bottom:16px;padding-bottom:14px;border-bottom:1px dashed var(--line)} .field:last-child{border-bottom:none}
  .field>label{display:block;font-size:13.5px;font-weight:700;margin-bottom:8px} .hint{font-size:11px;color:var(--muted);margin-top:6px}
  input[type=text],input[type=tel],input[type=number],input[type=date]{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;outline:none;background:#fff} input[type=tel]{font-size:16px} input:focus{border-color:var(--primary)}
  textarea{width:100%;min-height:84px;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;outline:none;resize:vertical}
  .opts{display:flex;flex-wrap:wrap;gap:8px}
  .opt{display:flex;align-items:center;gap:9px;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;cursor:pointer;user-select:none;font-size:14.5px;background:#fff} .opt:hover{border-color:#c8d4ea}
  .opt .box{width:20px;height:20px;border-radius:6px;border:2px solid #c4cdda;flex:0 0 auto;display:grid;place-items:center;font-size:12px;color:#fff}
  .opt.sel{border-color:var(--primary);background:#f1f6ff} .opt.sel .box{background:var(--primary);border-color:var(--primary)} .opt.radio .box{border-radius:50%}
  .seg-num{display:flex;align-items:center;gap:8px;border:1.5px solid var(--line);border-radius:12px;padding:8px 10px;margin-bottom:8px} .seg-num span{font-size:14px;color:var(--muted);white-space:nowrap}
  .seg-num input{width:auto;min-width:0;flex:1;border:none;text-align:right;padding:10px 2px;appearance:textfield}.seg-num input::-webkit-inner-spin-button,.seg-num input::-webkit-outer-spin-button{margin:0;appearance:none}
  .sign{height:128px;border:1.5px dashed #c4cdda;border-radius:12px;display:grid;place-items:center;color:var(--muted);font-size:13px;background:repeating-linear-gradient(45deg,#fafbfe,#fafbfe 10px,#f3f6fb 10px,#f3f6fb 20px)}
  .nav{display:flex;gap:10px;padding:12px 18px 18px;border-top:1px solid var(--line);background:#fff}
  .nav-stack{display:flex;flex-direction:column;gap:10px;width:100%}.nav-row{display:flex;gap:10px;width:100%}
  button{font-family:inherit;font-size:15px;font-weight:700;border-radius:12px;border:none;padding:14px 16px;cursor:pointer}
  .btn-primary{background:var(--primary);color:#fff;flex:1} .btn-ghost{background:var(--soft);color:var(--ink);flex:0 0 96px} .btn-submit{background:#004aad;color:#fff;flex:1}
  .btn-schedule-change{width:100%;background:var(--soft);color:var(--ink)} button:disabled{opacity:.6;cursor:not-allowed}
  .btn-primary:disabled{background:#c5cad3;color:#fff;opacity:1}
  .lockmsg{font-size:12px;color:var(--lock);text-align:center;padding:6px 18px 0}
  .days{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:6px}
  .day{border:1.5px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;background:#fff}
  .day .d{font-size:12px;color:var(--muted)} .day .n{font-size:20px;font-weight:800;margin-top:2px} .day .st{font-size:11px;margin-top:6px;color:var(--muted)}
  .day.done{background:#eef5ff;border-color:#c7dafa} .day.done .st{color:#004aad;font-weight:700}
  .day.locked{opacity:.5;cursor:not-allowed} .day.current{border-color:var(--primary);box-shadow:0 0 0 3px #e8f0ff}
  .pill{display:inline-block;font-size:11px;background:var(--soft);color:var(--muted);border-radius:99px;padding:3px 10px;margin-bottom:8px}
  .datechip{display:inline-block;font-size:12px;font-weight:700;background:#eaf1ff;color:#3b6fe0;border-radius:99px;padding:4px 12px;margin-bottom:10px}
  .section-tag{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.4px;border-radius:6px;padding:3px 8px;margin-bottom:8px}
  .tag-mom{background:#fde9ef;color:#c2456e} .tag-baby{background:#e7f1ff;color:#3b6fe0} .tag-etc{background:#eef0f4;color:#6b7686}
  .ro-row{display:flex;justify-content:space-between;font-size:13px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#f9fbfe} .ro-row b{color:var(--ink)}
  .phone-auth{display:flex;flex-direction:column;gap:14px}
  .phone-auth .muted{font-size:13px;line-height:1.55;color:var(--muted);margin:0 0 2px}
  .phone-auth .lab{font-size:13.5px;font-weight:700}
  .phone-auth .btn{width:100%;margin-top:4px}
  .phone-auth .primary{background:var(--primary);color:#fff}
  .text-back{display:block;border:0;border-radius:0;background:transparent;color:#004aad;font-size:13px;margin-bottom:10px;padding:4px 0;text-align:left}
  @keyframes modal-fade-in{from{opacity:0}to{opacity:1}}@keyframes modal-zoom-in{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  .modal-overlay{position:fixed;inset:0;z-index:200;display:grid;place-items:center;background:rgba(0,0,0,.5);padding:20px;animation:modal-fade-in .15s ease-out}
  .modal-dialog{z-index:201;width:min(340px,calc(100vw - 40px));border:1px solid var(--line);border-radius:16px;background:#fff;padding:20px;box-shadow:0 20px 50px rgba(28,36,48,.25);animation:modal-zoom-in .15s ease-out}
  .modal-dialog h2{font-size:18px;line-height:1.35;margin:0 0 8px}.modal-dialog p{font-size:13px;line-height:1.55;color:var(--muted);margin:0}
  .modal-actions{display:flex;gap:8px;margin-top:18px}.modal-actions button{flex:1;padding:10px 14px;border-radius:16px}
  .modal-request-approve{background:#004aad;color:#fff}.modal-cancel{border:1px solid var(--line);background:#fff;color:var(--ink)}
  .approval-modal-overlay{z-index:250}
  .approval-modal-dialog{position:relative;z-index:251;display:flex;aspect-ratio:5/3;width:calc(100vw - 40px);max-width:300px;flex-direction:column;border:0;border-radius:28px;background:#fff;padding:16px;box-shadow:0 20px 50px rgba(28,36,48,.25);animation:modal-zoom-in .15s ease-out}
  .approval-modal-header{display:flex;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:8px;text-align:center}.approval-modal-header h2{margin:0;color:var(--ink);font-size:14px;font-weight:700;line-height:20px}
  .approval-modal-description{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  .approval-modal-actions{display:flex;gap:8px}.approval-modal-actions button{width:50%;min-height:36px;border-radius:999px;padding:0 12px;font-size:13px}
  .approval-modal-cancel{border:1px solid #c7dafa;background:transparent;color:#004aad}.approval-modal-approve{border:2px solid #004aad;background:#004aad;color:#fff;box-shadow:0 2px 6px rgba(0,74,173,.2)}
  .handover{display:flex;gap:10px;align-items:flex-start;background:#eef5ff;border:1px solid #c7dafa;border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:13px;color:#004aad}
  .review-section{margin-top:14px}.review-row{display:flex;justify-content:space-between;gap:12px;font-size:13px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#f9fbfe}.review-row>span{color:var(--muted);flex:0 0 auto}.review-row b{color:var(--ink);text-align:right;font-weight:700;word-break:keep-all}
  .review-note{font-size:13px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;background:#f9fbfe}.review-note>span{display:block;color:var(--muted);margin-bottom:4px}.review-note b{font-weight:600;line-height:1.5}.review-row b.empty,.review-note b.empty{color:#b6bfcc;font-weight:600}.review-row b.ok,.review-note b.ok{color:#004aad}
  .confirmation-lock{font-size:12px;color:#9aa6b6;text-align:center;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
  <div class="ribbon">🅿️ 미리보기 목업 v3 · 제공일자 앞으로만 조정(건너뜀 대응) + 섹션별 페이지 + 산모 확인 + 제출잠금</div>
  <div class="phone">
    <div class="top"><h1>산모·신생아 건강관리 서비스 제공기록지</h1><div class="top-meta"><div data-component="feedback-provider-name" class="org" id="provider-org"></div><div class="crumbs" id="crumbs"></div></div><div class="bar"><i id="bar"></i></div></div>
    <div data-component="feedback-body" class="body" id="body"></div>
    <div class="lockmsg" id="lockmsg"></div>
    <div class="nav" id="nav"></div>
  </div>
  <div id="schedule-modal-root"></div>
<script>
const DEFAULT_SERVICE_DAYS=15, DAY_PAGE_COUNT=4, START=new Date(2026,5,29);
const queryParams=new URLSearchParams(window.location.search),requestedServiceDays=Number(queryParams.get('serviceDays'));
const previewProps={providerName:queryParams.get('providerName')?.trim()||undefined,serviceDays:Number.isSafeInteger(requestedServiceDays)&&requestedServiceDays>=1?requestedServiceDays:DEFAULT_SERVICE_DAYS};
const N_DAYS=previewProps.serviceDays;
const STORAGE_KEY=N_DAYS===DEFAULT_SERVICE_DAYS?'daily-service-feedback-preview-v3':`daily-service-feedback-preview-v3:${N_DAYS}`;
const SCREEN_NAMES=new Set(['phone','service','overview','day','done']);
const providerName=previewProps.providerName||'인천 아이미래로';
const createInitialState=()=>({screen:'phone',authed:false,phone:'',serviceDone:false,pendingScheduleChange:false,day:1,page:0,lockedDays:new Set(),dates:{},data:{},submittedDays:{}});
const isRecord=value=>Boolean(value)&&typeof value==='object'&&!Array.isArray(value);
function loadState(){const initial=createInitialState();try{const raw=sessionStorage.getItem(STORAGE_KEY);if(!raw)return initial;const saved=JSON.parse(raw);if(!isRecord(saved))return initial;const authed=Boolean(saved.authed);let screen=SCREEN_NAMES.has(saved.screen)?saved.screen:'phone';if(!authed&&screen!=='phone')screen='phone';const day=Number.isInteger(saved.day)&&saved.day>=1&&saved.day<=N_DAYS?saved.day:1;const page=Number.isInteger(saved.page)&&saved.page>=0&&saved.page<DAY_PAGE_COUNT?saved.page:0;const lockedDays=Array.isArray(saved.lockedDays)?saved.lockedDays.filter(d=>Number.isInteger(d)&&d>=1&&d<=N_DAYS):[];const dates={};if(isRecord(saved.dates))for(const [key,value] of Object.entries(saved.dates))if(/^\d{4}-\d{2}-\d{2}$/.test(value))dates[key]=value;return {...initial,screen,authed,phone:typeof saved.phone==='string'?saved.phone.slice(0,13):'',serviceDone:Boolean(saved.serviceDone),pendingScheduleChange:Boolean(saved.pendingScheduleChange),day,page,lockedDays:new Set(lockedDays),dates,data:isRecord(saved.data)?saved.data:{},submittedDays:isRecord(saved.submittedDays)?saved.submittedDays:{}};}catch{sessionStorage.removeItem(STORAGE_KEY);return initial;}}
const state=loadState();
function persistState(){try{sessionStorage.setItem(STORAGE_KEY,JSON.stringify({...state,lockedDays:[...state.lockedDays]}));}catch{}}
function setData(key,value){state.data[key]=value;persistState();updateDayNextButton();}
function setDate(day,value){state.dates[day]=value;render();}
function escapeHtml(value){return String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));}
const isoOf=dt=>{const x=new Date(dt);return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;};
const addDays=(iso,n)=>{const x=new Date(iso);x.setDate(x.getDate()+n);return isoOf(x);};
function minISO(d){ return d<=1? isoOf(START) : (state.dates[d-1]||addDays(isoOf(START),d-2)); }
function defaultISO(d){ return d<=1? isoOf(START) : addDays(state.dates[d-1]||addDays(isoOf(START),d-2),1); }
function curDate(d){ return state.dates[d]||defaultISO(d); }
const mmdd=iso=>iso.slice(5).replace('-','.');
const serviceFields=[
  {k:'momName',label:'산모 성명',type:'text',ph:'예) 홍길동'},{k:'momDob',label:'산모 생년월일 (YYMMDD)',type:'text',ph:'예) 900101'},
  {k:'babyName',label:'신생아 성명',type:'text',ph:'예) 홍아기'},{k:'babyDob',label:'신생아 출생일자 (YYMMDD)',type:'text',ph:'예) 260615'},
  {k:'delivery',label:'분만형태',type:'radio',opts:['자연분만','제왕절개']},{k:'babyWeight',label:'신생아 몸무게 (kg)',type:'text',ph:'예) 3.2'},
];
const dailyItems=[
  {t:'① 회음절개부위 (또는 수술부위)',type:'multi',opts:['이상없음','열상','혈종','불편감']},{t:'② 유방상태',type:'multi',opts:['이상없음','울혈','통증']},
  {t:'③ 배뇨/배변',type:'multi',opts:['이상없음','불편감']},{t:'④ 좌욕',type:'radio',opts:['실시','미실시']},
  {t:'⑤ 식사/간식',type:'counts',counts:[{k:'meal',label:'식사',unit:'회'},{k:'snack',label:'간식',unit:'회'}]},
  {t:'⑥ 체온',type:'counts',counts:[{k:'temp',label:'체온',unit:'℃',step:0.1}]},{t:'⑦ 수면 양상',type:'radio',opts:['잘 잠','잘 못 잠']},
  {t:'⑧ 모유수유',type:'counts',counts:[{k:'breast',label:'횟수',unit:'회'}]},{t:'⑨ 분유수유',type:'counts',counts:[{k:'formula',label:'횟수',unit:'회'},{k:'formulaMl',label:'회당',unit:'ml'}]},
  {t:'⑩ 배변양상',type:'stool',opts:['정상변','이상변']},{t:'⑪ 목욕·제대관리',type:'radio',opts:['실시','미실시']},
  {t:'기타 서비스 (필요 시 기재)',type:'textarea',ph:'추가사항에 대한 기록 필요 시 기재',optional:true},{t:'특이사항 (필요 시 기재)',type:'textarea',ph:'서비스 제공 관련 특이사항 기록 필요 시 기재',optional:true},
  {t:'결제 확인',type:'confirm',label:'결제 확인 완료'},
];
const dayPages=[{tag:'mom',title:'산모 기록',sub:'① ~ ⑤',items:[0,1,2,3,4]},{tag:'baby',title:'신생아 기록',sub:'⑥ ~ ⑪',items:[5,6,7,8,9,10]},{tag:'etc',title:'서비스 기록',sub:'기타 · 특이사항 · 결제 확인',items:[11,12,13]},{tag:'confirm',title:'기록 내용 확인',sub:'제공인력이 작성한 오늘의 기록입니다. 내용을 확인하신 후 아래 확인 버튼을 눌러 주세요.',items:[],confirmation:true}];
const reviewSections=[{title:'산모',tag:'tag-mom',items:[0,1,2,3,4]},{title:'신생아',tag:'tag-baby',items:[5,6,7,8,9,10]},{title:'서비스 기록',tag:'tag-etc',items:[11,12,13]}];
const body=document.getElementById('body'),nav=document.getElementById('nav'),bar=document.getElementById('bar'),crumbs=document.getElementById('crumbs'),lockmsg=document.getElementById('lockmsg'),providerOrg=document.getElementById('provider-org'),scheduleModalRoot=document.getElementById('schedule-modal-root');
providerOrg.textContent=providerName;
function setProgress(){let p=5;if(state.screen==='service')p=12;else if(state.screen==='overview')p=20;else if(state.screen==='day')p=20+Math.round((state.page+1)/dayPages.length*70);else if(state.screen==='done')p=100;bar.style.width=p+'%';}
function setCrumbs(t){crumbs.innerHTML=t;} function go(s){state.screen=s;render();}
function render(skipPersist=false){if(!skipPersist)persistState();lockmsg.textContent='';body.classList.toggle('completion-body',state.screen==='done');if(state.screen==='phone')return renderPhone();if(state.screen==='service')return renderService();if(state.screen==='overview')return renderOverview();if(state.screen==='day')return renderDay();if(state.screen==='done')return renderDone();}
function renderPhone(){setCrumbs('1단계 · <b>본인 확인</b>');body.innerHTML=`<div data-component="feedback-phone-form" class="phone-auth"><div data-component="feedback-phone-title" class="step-title">제공인력 본인 확인</div><p data-component="feedback-phone-description" class="muted">본인 휴대폰 번호를 입력하면 서비스 기간 동안 유효한 접근 권한이 발급됩니다.</p><label data-component="feedback-phone-label" class="lab" for="phone">휴대폰 번호</label><input data-component="feedback-phone-input" class="in" id="phone" inputmode="numeric" autocomplete="tel" maxlength="13" placeholder="예) 01012345678" type="tel" oninput="formatPhone(this)"/><button data-component="feedback-phone-submit" class="btn primary" onclick="doAuth()">확인하기</button></div>`;body.querySelector('[data-component="feedback-phone-input"]').value=state.phone;nav.innerHTML='';setProgress();}
function formatPhone(el){const digits=el.value.replace(/\D/g,'').slice(0,11);let formatted=digits;if(digits.length>3&&digits.length<=7)formatted=`${digits.slice(0,3)}-${digits.slice(3)}`;else if(digits.length>7){const middleEnd=digits.length===10?6:7;formatted=`${digits.slice(0,3)}-${digits.slice(3,middleEnd)}-${digits.slice(middleEnd)}`;}el.value=formatted;state.phone=formatted;persistState();}
function doAuth(){const digits=(document.getElementById('phone').value||'').replace(/\D/g,'');if(digits.length<10||digits.length>11){alert('휴대폰 번호 10~11자리를 입력해 주세요.');return;}state.authed=true;state.screen=state.serviceDone?'overview':'service';render();}
function renderService(){setCrumbs('2단계 · <b>서비스 기본정보</b>');let h=`<button data-component="feedback-service-back" class="text-back" onclick="go('phone')">이전</button><div class="step-title">서비스 기본정보</div><div class="ro-row"><span>제공인력</span><b>김제공</b></div><div class="ro-row"><span>제공기관</span><b data-component="feedback-service-provider-name"></b></div>`;for(const f of serviceFields){if(f.type==='radio'){ensureRadioDefault(f.k,f.opts);h+=`<div class="field"><label>${f.label}</label><div class="opts">`+f.opts.map(o=>`<div class="opt radio ${state.data[f.k]===o?'sel':''}" onclick="pickRadio(this,'${f.k}','${o}')"><span class="box">●</span>${o}</div>`).join('')+`</div></div>`;}else h+=`<div class="field"><label>${f.label}</label><input type="text" placeholder="${f.ph||''}" oninput="setData('${f.k}',this.value)" value="${escapeHtml(state.data[f.k])}"/></div>`;}body.innerHTML=h;body.querySelector('[data-component="feedback-service-provider-name"]').textContent=providerName;persistState();nav.innerHTML=`<button class="btn-primary" onclick="serviceNext()">다음</button>`;setProgress();}
function serviceNext(){state.serviceDone=true;go('overview');}
function renderOverview(){if(state.lockedDays.size===N_DAYS){state.screen='done';return render();}setCrumbs('3단계 · <b>일자별 기록</b>');let cells='';for(let d=1;d<=N_DAYS;d++){const done=state.lockedDays.has(d),open=d===nextOpenDay(),cur=open&&!done;const cls=done?'day done':cur?'day current':(open?'day':'day locked');const st=done?'제출완료':(open?'입력 가능':'대기');const click=(!done&&open)?`onclick="openDay(${d})"`:'';cells+=`<div class="${cls}" ${click}><div class="d">${mmdd(curDate(d))}</div><div class="n">${d}</div><div class="st">${st}</div></div>`;}body.innerHTML=`<button data-component="feedback-overview-back" class="text-back" onclick="go('service')">이전</button><div class="step-title">제공기록표</div><div class="step-sub">서비스 제공 기록은 해당 날짜에만 기록이 가능하며, 한번 제출된 기록은 수정할 수 없습니다.</div><div class="days">${cells}</div>`;const pending=state.pendingScheduleChange;nav.innerHTML=`<div class="nav-stack"><button class="btn-primary" onclick="openDay(nextOpenDay())">${state.lockedDays.size?'다음 회차 입력':'기록 시작'}</button><button class="btn-schedule-change" ${pending?'disabled':''} onclick="openScheduleChangePreview()">${pending?'일정 변경 요청 대기 중':'서비스 일정 변경'}</button></div>`;setProgress();}
function nextOpenDay(){let d=1;while(state.lockedDays.has(d))d++;return d;}
let scheduleChangePreview=null;
function nextBusinessDate(iso){const date=new Date(`${iso}T12:00:00`);do{date.setDate(date.getDate()+1);}while(date.getDay()===0||date.getDay()===6);return isoOf(date);}
function monthDayKo(iso){const [,month,day]=iso.split('-').map(Number);return `${month}월 ${day}일`;}
function openScheduleChangePreview(){if(state.pendingScheduleChange)return;const sessionIndex=nextOpenDay();if(sessionIndex>N_DAYS)return;const fromDate=curDate(sessionIndex),toDate=nextBusinessDate(fromDate);scheduleChangePreview={sessionIndex,fromDate,toDate};scheduleModalRoot.innerHTML=`<div data-component="feedback-schedule-change-overlay" class="modal-overlay"><div data-component="feedback-schedule-change-dialog" class="modal-dialog" role="alertdialog" aria-modal="true" aria-labelledby="schedule-change-title" aria-describedby="schedule-change-description"><h2 id="schedule-change-title">${sessionIndex}회차 서비스 일정을 조정할까요?</h2><p id="schedule-change-description">${sessionIndex}회차 서비스를 ${monthDayKo(fromDate)}에서 ${monthDayKo(toDate)}로 변경을 요청할까요? 관리자 승인 후 일정이 조정됩니다.</p><div class="modal-actions"><button data-component="feedback-schedule-change-cancel" class="modal-cancel" onclick="closeScheduleChangeModal()">취소</button><button data-component="feedback-schedule-change-approve" class="modal-request-approve" onclick="submitScheduleChangeRequest()">승인 요청</button></div></div></div>`;}
function closeScheduleChangeModal(){scheduleChangePreview=null;scheduleModalRoot.innerHTML='';}
function submitScheduleChangeRequest(){if(!scheduleChangePreview)return;const confirmButton=scheduleModalRoot.querySelector('[data-component="feedback-schedule-change-approve"]'),buttons=scheduleModalRoot.querySelectorAll('button');buttons.forEach(button=>button.disabled=true);confirmButton.textContent='요청 중…';setTimeout(()=>{state.pendingScheduleChange=true;persistState();closeScheduleChangeModal();render();},350);}
function openDay(d){if(state.lockedDays.has(d)||d!==nextOpenDay())return;state.day=d;state.page=0;if(!state.dates[d])state.dates[d]=defaultISO(d);go('day');}
function dateField(d){return `<div class="field"><input type="date" value="${curDate(d)}" min="${minISO(d)}" onchange="setDate(${d},this.value)"/></div>`;}
function ensureRadioDefault(key,options){if(!hasValue(state.data[key]))state.data[key]=options[0];}
function fieldBlock(idx){const it=dailyItems[idx],key=`d${state.day}_${idx}`;let h=`<div class="field"><label>${it.t}</label>`;if(it.type==='multi'){if(!Array.isArray(state.data[key]))state.data[key]=it.opts.includes('이상없음')?['이상없음']:[];h+=`<div class="opts">`+it.opts.map(o=>`<div class="opt ${isSel(key,o)?'sel':''}" onclick="toggleMulti('${key}','${o}',this)"><span class="box">✓</span>${o}</div>`).join('')+`</div>`;}else if(it.type==='radio'){ensureRadioDefault(key,it.opts);h+=`<div class="opts">`+it.opts.map(o=>`<div class="opt radio ${state.data[key]===o?'sel':''}" onclick="pickRadio(this,'${key}','${o}')"><span class="box">●</span>${o}</div>`).join('')+`</div>`;}else if(it.type==='counts')h+=it.counts.map(c=>{const step=c.step||1,countKey=`${key}_${c.k}`;return `<div class="seg-num"><span>${c.label}</span><input type="number" inputmode="${step<1?'decimal':'numeric'}" min="0" step="${step}" aria-label="${c.label}" oninput="setData('${countKey}',this.value)" value="${escapeHtml(state.data[countKey])}"/><span>${c.unit}</span></div>`;}).join('');else if(it.type==='stool'){ensureRadioDefault(key,it.opts);h+=`<div class="opts">`+it.opts.map(o=>`<div class="opt radio ${state.data[key]===o?'sel':''}" onclick="pickRadio(this,'${key}','${o}')"><span class="box">●</span>${o}</div>`).join('')+`</div><input style="margin-top:8px" type="text" placeholder="색깔 등 (이상변 시)" oninput="setData('${key}_color',this.value)" value="${escapeHtml(state.data[key+'_color'])}"/>`;}else if(it.type==='textarea')h+=`<textarea placeholder="${it.ph||''}" oninput="setData('${key}',this.value)">${escapeHtml(state.data[key])}</textarea>`;else if(it.type==='confirm')h+=`<div class="opts"><div class="opt ${state.data[key]?'sel':''}" onclick="toggleConfirm('${key}',this)"><span class="box">✓</span>${it.label}</div></div>`;return h+`</div>`;}
function reviewValue(idx){const it=dailyItems[idx],key=`d${state.day}_${idx}`;let value='',ok=false;if(it.type==='multi')value=Array.isArray(state.data[key])?state.data[key].filter(hasValue).join(', '):'';else if(it.type==='radio')value=hasValue(state.data[key])?String(state.data[key]).trim():'';else if(it.type==='counts')value=it.counts.map(c=>{const count=state.data[`${key}_${c.k}`];if(!hasValue(count))return null;const prefix=c.label==='횟수'||c.label==='체온'?'':`${c.label} `;return `${prefix}${String(count).trim()}${c.unit}`;}).filter(Boolean).join(' · ');else if(it.type==='stool'){value=hasValue(state.data[key])?String(state.data[key]).trim():'';const color=state.data[`${key}_color`];if(value&&hasValue(color))value+=` (${String(color).trim()})`;}else if(it.type==='textarea')value=hasValue(state.data[key])?String(state.data[key]).trim():'';else if(it.type==='confirm'&&state.data[key]){value='✓ 확인 완료';ok=true;}return {value,ok};}
function renderReviewField(idx){const it=dailyItems[idx],display=reviewValue(idx),value=escapeHtml(display.value||'입력 없음'),className=display.value?(display.ok?'ok':''):'empty';if(it.type==='textarea')return `<div class="review-note"><span>${it.t}</span><b class="${className}">${value}</b></div>`;return `<div class="review-row"><span>${it.t}</span><b class="${className}">${value}</b></div>`;}
function renderConfirmationReview(){return `<div class="review">`+reviewSections.map(section=>`<section class="review-section"><span class="section-tag ${section.tag}">${section.title}</span>`+section.items.map(renderReviewField).join('')+`</section>`).join('')+`</div>`;}
function hasValue(value){return value!==undefined&&value!==null&&String(value).trim()!=='';}
function isDailyItemComplete(idx){const it=dailyItems[idx],key=`d${state.day}_${idx}`;if(it.optional)return true;if(it.type==='multi')return Array.isArray(state.data[key])&&state.data[key].length>0;if(it.type==='radio')return hasValue(state.data[key]);if(it.type==='counts')return it.counts.every(c=>hasValue(state.data[`${key}_${c.k}`]));if(it.type==='stool')return hasValue(state.data[key])&&(state.data[key]!=='이상변'||hasValue(state.data[`${key}_color`]));if(it.type==='textarea')return hasValue(state.data[key]);if(it.type==='confirm')return state.data[key]===true;return true;}
function isCurrentDayPageComplete(){return dayPages[state.page].items.every(isDailyItemComplete);}
function updateDayNextButton(){if(state.screen!=='day'||state.page>=dayPages.length-1)return;const button=nav.querySelector('.btn-primary');if(button)button.disabled=!isCurrentDayPageComplete();}
function renderDay(){const pg=dayPages[state.page],confirmation=Boolean(pg.confirmation);setCrumbs(`<b>${state.day}회차</b> · ${pg.title} (${state.page+1}/${dayPages.length})`);let inner=`<button data-component="feedback-day-back" class="text-back" onclick="prevPage()">이전</button><div class="datechip">${state.day}회차</div><div class="step-title">${pg.title}</div>`;if(state.page===0)inner+=dateField(state.day);if(confirmation)inner+=`<div class="handover"><b>최종 기록을 확인해 주세요.</b></div>`+renderConfirmationReview()+`<p class="confirmation-lock">최종 확인 후에는 수정할 수 없으니 한번 더 확인해 주세요.</p>`;else for(const idx of pg.items)inner+=fieldBlock(idx);body.innerHTML=inner;persistState();const canContinue=isCurrentDayPageComplete();nav.innerHTML=confirmation?`<button class="btn-submit" onclick="submitDay()">확인</button>`:`<button class="btn-primary" ${canContinue?'':'disabled'} onclick="nextPage()">다음</button>`;setProgress();}
function isSel(key,o){return Array.isArray(state.data[key])&&state.data[key].includes(o);}
function toggleMulti(key,o,el){const a=Array.isArray(state.data[key])?state.data[key]:[];const i=a.indexOf(o);if(i>=0)a.splice(i,1);else a.push(o);state.data[key]=a;el.classList.toggle('sel');persistState();updateDayNextButton();}
function pickRadio(el,key,o){state.data[key]=o;[...el.parentNode.children].forEach(c=>c.classList.remove('sel'));el.classList.add('sel');persistState();updateDayNextButton();}
function toggleConfirm(key,el){state.data[key]=!state.data[key];el.classList.toggle('sel');persistState();updateDayNextButton();}
function nextPage(){if(state.page<dayPages.length-1&&isCurrentDayPageComplete()){state.page++;render();}}
function prevPage(){if(state.page>0){state.page--;render();}else go('overview');}
let submitModalTrigger=null;
function submitDay(){submitModalTrigger=document.activeElement;document.addEventListener('keydown',handleSubmitModalKeydown);scheduleModalRoot.innerHTML=`<div data-component="feedback-submit-overlay" class="modal-overlay approval-modal-overlay" onclick="if(event.target===this)closeSubmitDayModal()"><div data-component="approval-two-button-modal" class="approval-modal-dialog" role="alertdialog" aria-modal="true" aria-labelledby="submit-title" aria-describedby="submit-description"><div class="approval-modal-header"><h2 id="submit-title">제출하시겠어요?</h2><p id="submit-description" class="approval-modal-description">확인하면 ${state.day}회차 기록이 제출되어 수정할 수 없습니다.</p></div><div class="approval-modal-actions"><button data-component="feedback-submit-cancel" class="approval-modal-cancel" onclick="closeSubmitDayModal()">취소</button><button data-component="feedback-submit-confirm" class="approval-modal-approve" onclick="confirmSubmitDay()">확인</button></div></div></div>`;setTimeout(()=>scheduleModalRoot.querySelector('[data-component="feedback-submit-cancel"]')?.focus(),0);}
function handleSubmitModalKeydown(event){if(event.key==='Escape')closeSubmitDayModal();}
function closeSubmitDayModal(){document.removeEventListener('keydown',handleSubmitModalKeydown);scheduleModalRoot.innerHTML='';if(submitModalTrigger instanceof HTMLElement&&submitModalTrigger.isConnected)submitModalTrigger.focus();submitModalTrigger=null;}
function resetDailyFormState(){for(const key of Object.keys(state.data))if(/^d\d+_/.test(key))delete state.data[key];state.page=0;}
function confirmSubmitDay(){const submittedDate=curDate(state.day),prefix=`d${state.day}_`,draft={};for(const [key,value] of Object.entries(state.data))if(key.startsWith(prefix))draft[key]=value;state.submittedDays[state.day]={date:submittedDate,data:draft};state.lockedDays.add(state.day);resetDailyFormState();persistState();closeSubmitDayModal();go(state.lockedDays.size===N_DAYS?'done':'overview');}
function renderDone(){setCrumbs('<b>최종 제출 완료</b>');body.innerHTML=`<span class="completion-icon" aria-hidden="true">✅</span><h2 class="completion-title">제공기록지 제출이 완료되었습니다.</h2>`;nav.innerHTML='';setProgress();}
render();
</script>
</body>
</html>
