<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Employee Form Dialog Redesign Mockup</title>
    <style>
      :root {
        --bg: #eef4fb;
        --surface: #ffffff;
        --ink: #182334;
        --muted: #7b8798;
        --soft: #f5f8fc;
        --line: #d9e3f0;
        --line-strong: #c7d5e6;
        --primary: #0b63ce;
        --primary-soft: #e8f1ff;
        --green: #12805c;
        --green-soft: #e8f8f0;
        --danger: #b45363;
        --shadow: 0 24px 70px rgba(25, 49, 82, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, rgba(11, 99, 206, 0.12), transparent 32rem),
          linear-gradient(135deg, #f7fbff 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .stage {
        width: min(920px, calc(100vw - 48px));
        padding: 24px;
      }

      .dialog {
        overflow: hidden;
        border-radius: 30px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 28px 32px 24px;
        border-bottom: 1px solid var(--line);
      }

      .header-main {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .icon-box {
        display: grid;
        width: 52px;
        height: 52px;
        place-items: center;
        border-radius: 18px;
        background: var(--primary-soft);
        color: var(--primary);
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.18;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 6px 0 0;
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
      }

      .close {
        display: grid;
        width: 28px;
        height: 28px;
        place-items: center;
        border: 0;
        background: transparent;
        color: #718096;
      }

      .content {
        background: var(--surface);
      }

      .form-wrap {
        display: flex;
        min-width: 0;
        flex-direction: column;
        background: var(--surface);
      }

      .form {
        flex: 1;
        padding: 30px 34px 32px;
      }

      .section {
        padding-bottom: 26px;
      }

      .section + .section {
        padding-top: 25px;
        border-top: 1px solid var(--line);
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 16px;
      }

      .section-title {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: -0.01em;
      }

      .section-note {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .wide {
        grid-column: 1 / -1;
      }

      label {
        color: #465368;
        font-size: 12px;
        font-weight: 700;
      }

      .required {
        color: var(--danger);
      }

      .control {
        display: flex;
        align-items: center;
        min-height: 42px;
        width: 100%;
        border: 1.35px solid var(--line-strong);
        border-radius: 14px;
        background: #fff;
        padding: 0 14px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 650;
        box-shadow: 0 1px 0 rgba(25, 49, 82, 0.02);
      }

      .control.placeholder {
        color: #8a9ab0;
      }

      .control.select {
        justify-content: space-between;
      }

      .availability {
        justify-content: space-between;
        background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      }

      .toggle {
        position: relative;
        width: 44px;
        height: 24px;
        border-radius: 999px;
        background: var(--primary);
      }

      .toggle::after {
        content: "";
        position: absolute;
        top: 3px;
        right: 3px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 1px 4px rgba(24, 35, 52, 0.28);
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 20px 34px;
        border-top: 1px solid var(--line);
        background: #fbfdff;
      }

      .progress {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }

      .actions {
        display: flex;
        gap: 12px;
      }

      .btn {
        min-width: 132px;
        height: 44px;
        border-radius: 999px;
        border: 1.35px solid var(--line-strong);
        background: white;
        color: #2a3445;
        font-size: 14px;
        font-weight: 850;
      }

      .btn.primary {
        border-color: var(--primary);
        background: var(--primary);
        color: white;
        box-shadow: 0 14px 28px rgba(11, 99, 206, 0.24);
      }

      @media (max-width: 860px) {
        .stage {
          width: min(620px, calc(100vw - 24px));
          padding: 12px;
        }

        .header {
          padding: 24px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .footer {
          align-items: stretch;
          flex-direction: column;
        }

        .actions {
          width: 100%;
        }

        .btn {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="dialog" aria-label="직원 추가 목업">
        <header class="header">
          <div class="header-main">
            <div class="icon-box" aria-hidden="true">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2" />
                <circle cx="9.5" cy="7" r="4" />
                <path d="m17 11 2 2 4-4" />
              </svg>
            </div>
            <div>
              <h1>직원 추가</h1>
              <p class="subtitle">필수 정보만 빠르게 입력하고, 상세 내용은 나중에 보완합니다.</p>
            </div>
          </div>
          <button class="close" type="button" aria-label="닫기">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </header>

        <div class="content">
          <div class="form-wrap">
            <div class="form">
              <section class="section">
                <div class="section-head">
                  <h2 class="section-title">기본 정보</h2>
                  <p class="section-note">이름과 연락처는 필수입니다.</p>
                </div>
                <div class="grid">
                  <div class="field">
                    <label>이름 <span class="required">*</span></label>
                    <div class="control">홍길동</div>
                  </div>
                  <div class="field">
                    <label>연락처 <span class="required">*</span></label>
                    <div class="control">010-1234-5678</div>
                  </div>
                  <div class="field">
                    <label>생년월일</label>
                    <div class="control placeholder">YYMMDD</div>
                  </div>
                  <div class="field">
                    <label>메모</label>
                    <div class="control placeholder">선택 입력</div>
                  </div>
                </div>
              </section>

              <section class="section">
                <div class="section-head">
                  <h2 class="section-title">근무 설정</h2>
                  <p class="section-note">배정 후보 노출 조건을 정합니다.</p>
                </div>
                <div class="grid">
                  <div class="field">
                    <label>등급 <span class="required">*</span></label>
                    <div class="control select">스탠다드
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a9ab0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m6 9 6 6 6-6" />
                      </svg>
                    </div>
                  </div>
                  <div class="field">
                    <label>근무 지역 <span class="required">*</span></label>
                    <div class="control select placeholder">근무 지역 선택
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a9ab0" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m6 9 6 6 6-6" />
                      </svg>
                    </div>
                  </div>
                  <div class="field wide">
                    <label>근무 가능 여부</label>
                    <div class="control availability">
                      <span>다음 근무 배정 가능</span>
                      <span class="toggle" aria-hidden="true"></span>
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <footer class="footer">
              <div class="progress">필수 4개 항목 중 3개 입력됨</div>
              <div class="actions">
                <button class="btn" type="button">취소</button>
                <button class="btn primary" type="button">생성</button>
              </div>
            </footer>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
