# Railway / Nixpacks build config.
#
# The headless eformsign dispatch (BJJ-90) drives Chromium via Playwright in
# the backend process, which needs the Debian shared libraries below at
# runtime. EformsignHeadlessService catches launch failures and returns
# `ok: false` (frontend then falls back to the iframe modal), so a missing
# Chromium binary degrades gracefully rather than breaking the deploy.
#
# Only `aptPkgs` is set here — the rest of the build (pnpm install, build,
# start) is left to Nixpacks's existing auto-detect for the workspace.
[phases.setup]
aptPkgs = [
    "ca-certificates",
    "fonts-liberation",
    "libasound2",
    "libatk-bridge2.0-0",
    "libatk1.0-0",
    "libatspi2.0-0",
    "libcairo2",
    "libcups2",
    "libdbus-1-3",
    "libdrm2",
    "libgbm1",
    "libglib2.0-0",
    "libgtk-3-0",
    "libnspr4",
    "libnss3",
    "libpango-1.0-0",
    "libwayland-client0",
    "libx11-6",
    "libx11-xcb1",
    "libxcb1",
    "libxcomposite1",
    "libxdamage1",
    "libxext6",
    "libxfixes3",
    "libxkbcommon0",
    "libxrandr2",
    "wget",
    "xdg-utils",
]
