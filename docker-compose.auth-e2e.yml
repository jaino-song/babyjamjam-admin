services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: babyjamjam_auth_e2e
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d babyjamjam_auth_e2e"]
      interval: 2s
      timeout: 2s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30
    tmpfs:
      - /data

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "51025:1025"
      - "58025:8025"
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 2s
      timeout: 2s
      retries: 30
