name: Native iOS CI

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - "native/**"

permissions:
  contents: read

jobs:
  ios_ci:
    name: iOS CI
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Run iOS Fastlane lane
        working-directory: native/iosApp
        run: fastlane ios ci

      - name: Upload iOS build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ci-logs
          path: native/iosApp/fastlane/report.xml
          if-no-files-found: ignore

  sca_scan:
    name: SCA Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy file system scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: native
          format: sarif
          output: trivy-native-ios.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-native-ios.sarif
