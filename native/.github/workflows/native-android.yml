name: Native Android CI

on:
  pull_request:
    branches: [main, master, develop]
    paths:
      - "native/**"

permissions:
  contents: read

jobs:
  android_ci:
    name: Android CI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Run Android Fastlane lane
        working-directory: native/androidApp
        run: fastlane android ci

      - name: Upload Android reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-ci-reports
          path: |
            native/androidApp/build/reports
            native/androidApp/build/test-results
          if-no-files-found: ignore

  sca_scan:
    name: SCA Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy file system scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: native
          format: sarif
          output: trivy-native-android.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-native-android.sarif
