name: Preview DB Patches

on:
  workflow_dispatch:
  push:
    branches: [ preview ]
    paths:
      - 'backend/prisma/migrations/20260612000000_make_client_care_center_nullable/**'
      - '.github/workflows/preview-db-patches.yml'

concurrency:
  group: preview-db-patches
  cancel-in-progress: false

jobs:
  apply:
    name: apply preview database patches
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: preview
    env:
      DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PREVIEW_DIRECT_URL || secrets.PREVIEW_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check database secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PREVIEW_DATABASE_URL secret is required."
            exit 1
          fi

          if [ -z "$DIRECT_URL" ]; then
            echo "PREVIEW_DIRECT_URL or PREVIEW_DATABASE_URL secret is required."
            exit 1
          fi

      - name: Apply care_center nullable patch
        working-directory: backend
        run: >-
          pnpm exec prisma db execute
          --schema prisma/schema.prisma
          --file prisma/migrations/20260612000000_make_client_care_center_nullable/migration.sql

      - name: Verify care_center is nullable
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --stdin <<'SQL'
          DO $$
          BEGIN
            IF EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'client'
                AND column_name = 'care_center'
                AND is_nullable <> 'YES'
            ) THEN
              RAISE EXCEPTION 'client.care_center is still NOT NULL';
            END IF;
          END $$;
          SQL
