name: Frontend Playwright Tests

# Manual-only until Phase 6 stands up the real backend stack in CI
# (Postgres container + migrate deploy + seed + NestJS boot). The suites
# are backend-coupled and time out without it — verified 2026-06-06.
# Blocking per-PR coverage for the frontend lives in frontend-ci.yml.
on:
  workflow_dispatch:

jobs:
  test:
    name: frontend
    timeout-minutes: 60
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml
    
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      working-directory: .
    
    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps chromium
    
    - name: Run Playwright tests
      run: pnpm exec playwright test
      env:
        CI: true
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
    
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
