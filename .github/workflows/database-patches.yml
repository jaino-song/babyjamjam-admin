name: Database Patches

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target database environment
        required: true
        default: preview
        type: choice
        options:
          - dev
          - preview
          - production
  push:
    branches: [ dev, preview, main ]
    paths:
      - 'backend/prisma/**'
      - '.github/workflows/database-patches.yml'

concurrency:
  group: database-patches-${{ inputs.target || github.ref_name }}
  cancel-in-progress: false

jobs:
  apply-dev:
    name: apply dev database patches
    if: >-
      (github.event_name == 'push' && github.ref_name == 'dev') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'dev')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: dev
    env:
      DATABASE_URL: ${{ secrets.DEV_DATABASE_URL || secrets.DEVELOPMENT_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DEV_DIRECT_URL || secrets.DEVELOPMENT_DIRECT_URL || secrets.DEV_DATABASE_URL || secrets.DEVELOPMENT_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check database secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DEV_DATABASE_URL or DEVELOPMENT_DATABASE_URL secret is required."
            exit 1
          fi

          if [ -z "$DIRECT_URL" ]; then
            echo "DEV_DIRECT_URL, DEVELOPMENT_DIRECT_URL, DEV_DATABASE_URL, or DEVELOPMENT_DATABASE_URL secret is required."
            exit 1
          fi

      - name: Apply message schema compatibility patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713120000_repair_message_table_renames/migration.sql
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709000000_message_automation_hardening/migration.sql

      - name: Apply eformsign document relation patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709100000_link_eformsign_and_message_relations/migration.sql
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709110000_add_message_log_recipient_snapshot/migration.sql

      - name: Verify eformsign document relation patches
        working-directory: backend
        run: pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/scripts/verify-eformsign-document-relations.sql

      - name: Apply client-owned service-record patch
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713000000_add_client_service_record_case/migration.sql
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713110000_align_service_record_case_schema/migration.sql

      - name: Verify client-owned service-record patch
        working-directory: backend
        run: pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/scripts/verify-service-record-cases.sql

      - name: Apply user approval + token-version patch
        working-directory: backend
        run: pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713100000_add_user_approval_and_token_version/migration.sql

      - name: Verify user approval + token-version patch
        working-directory: backend
        run: pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/scripts/verify-user-approval.sql

  apply-preview:
    name: apply preview database patches
    if: >-
      (github.event_name == 'push' && github.ref_name == 'preview') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: preview
    env:
      DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PREVIEW_DIRECT_URL || secrets.PREVIEW_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check database secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PREVIEW_DATABASE_URL secret is required."
            exit 1
          fi

          if [ -z "$DIRECT_URL" ]; then
            echo "PREVIEW_DIRECT_URL or PREVIEW_DATABASE_URL secret is required."
            exit 1
          fi

      - name: Apply message schema compatibility patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713120000_repair_message_table_renames/migration.sql
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709000000_message_automation_hardening/migration.sql

      - name: Apply idempotent database patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --stdin <<'SQL'
          ALTER TABLE "client" ALTER COLUMN "care_center" DROP NOT NULL;
          ALTER TABLE "client_draft" ADD COLUMN IF NOT EXISTS "confirming_started_at" TIMESTAMPTZ(6);
          ALTER TABLE "message_trigger_job"  ADD COLUMN IF NOT EXISTS "attempts" INTEGER NOT NULL DEFAULT 0;
          ALTER TABLE "message_trigger_job"  ADD COLUMN IF NOT EXISTS "next_attempt_at" TIMESTAMPTZ(6);
          ALTER TABLE "message_trigger_rule" ADD COLUMN IF NOT EXISTS "is_default" BOOLEAN NOT NULL DEFAULT false;
          ALTER TABLE "message_trigger_rule" ADD COLUMN IF NOT EXISTS "jobs_stale" BOOLEAN NOT NULL DEFAULT false;
          UPDATE "message_trigger_rule"
          SET "is_active" = false
          WHERE "is_active" = true
            AND "branch_id" IN (SELECT "id" FROM "branch" WHERE "sms_sender_approval_status" IS DISTINCT FROM 'approved');
          UPDATE "message_trigger_rule" r
          SET "is_default" = true
          WHERE r."is_default" = false
            AND r."template_key" IN ('SERVICE_INFO', 'CLIENT_GREETING')
            AND r."branch_id" IN (SELECT "id" FROM "branch" WHERE "sms_sender_approval_status" IS DISTINCT FROM 'approved')
            AND r."id" = (
              SELECT r2."id" FROM "message_trigger_rule" r2
              WHERE r2."branch_id" = r."branch_id" AND r2."template_key" = r."template_key"
              ORDER BY r2."created_at" ASC LIMIT 1
            );
          UPDATE "message_trigger_job"
          SET "status" = 'canceled', "canceled_at" = now(), "cancel_reason" = '메시지 발송 승인 전 자동 생성 취소'
          WHERE "status" = 'pending'
            AND "branch_id" IN (SELECT "id" FROM "branch" WHERE "sms_sender_approval_status" IS DISTINCT FROM 'approved');
          CREATE UNIQUE INDEX IF NOT EXISTS "uniq_message_trigger_rule_default"
          ON "message_trigger_rule" ("branch_id", "template_key") WHERE "is_default" = true;
          SQL

      - name: Verify database patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --stdin <<'SQL'
          DO $$
          BEGIN
            IF EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'client'
                AND column_name = 'care_center'
                AND is_nullable <> 'YES'
            ) THEN
              RAISE EXCEPTION 'client.care_center is still NOT NULL';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'client_draft'
                AND column_name = 'confirming_started_at'
                AND data_type = 'timestamp with time zone'
                AND is_nullable = 'YES'
            ) THEN
              RAISE EXCEPTION 'client_draft.confirming_started_at is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'message_trigger_job'
                AND column_name = 'attempts'
                AND data_type = 'integer'
                AND is_nullable = 'NO'
                AND column_default = '0'
            ) THEN
              RAISE EXCEPTION 'message_trigger_job.attempts is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'message_trigger_job'
                AND column_name = 'next_attempt_at'
                AND data_type = 'timestamp with time zone'
                AND is_nullable = 'YES'
            ) THEN
              RAISE EXCEPTION 'message_trigger_job.next_attempt_at is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'message_trigger_rule'
                AND column_name = 'is_default'
                AND data_type = 'boolean'
                AND is_nullable = 'NO'
                AND column_default = 'false'
            ) THEN
              RAISE EXCEPTION 'message_trigger_rule.is_default is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'message_trigger_rule'
                AND column_name = 'jobs_stale'
                AND data_type = 'boolean'
                AND is_nullable = 'NO'
                AND column_default = 'false'
            ) THEN
              RAISE EXCEPTION 'message_trigger_rule.jobs_stale is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM pg_indexes
              WHERE schemaname = 'public'
                AND tablename = 'message_trigger_rule'
                AND indexname = 'uniq_message_trigger_rule_default'
            ) THEN
              RAISE EXCEPTION 'message_trigger_rule.uniq_message_trigger_rule_default index is missing';
            END IF;
          END $$;
          SQL

      - name: Apply eformsign document relation patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709100000_link_eformsign_and_message_relations/migration.sql
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709110000_add_message_log_recipient_snapshot/migration.sql

      - name: Verify eformsign document relation patches
        working-directory: backend
        run: pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/scripts/verify-eformsign-document-relations.sql

      - name: Apply client-owned service-record patch
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713000000_add_client_service_record_case/migration.sql
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713110000_align_service_record_case_schema/migration.sql

      - name: Verify client-owned service-record patch
        working-directory: backend
        run: pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/scripts/verify-service-record-cases.sql

      - name: Apply user approval + token-version patch
        working-directory: backend
        run: pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713100000_add_user_approval_and_token_version/migration.sql

      - name: Verify user approval + token-version patch
        working-directory: backend
        run: pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/scripts/verify-user-approval.sql

  apply-production:
    name: apply production database patches
    needs: [apply-preview]
    if: >-
      always() &&
      (
        (github.event_name == 'push' && github.ref_name == 'preview' && needs['apply-preview'].result == 'success') ||
        (github.event_name == 'push' && github.ref_name == 'main') ||
        (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL || secrets.PROD_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL || secrets.PROD_DIRECT_URL || secrets.PRODUCTION_DATABASE_URL || secrets.PROD_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check database secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "PRODUCTION_DATABASE_URL or PROD_DATABASE_URL secret is required."
            exit 1
          fi

          if [ -z "$DIRECT_URL" ]; then
            echo "PRODUCTION_DIRECT_URL, PROD_DIRECT_URL, PRODUCTION_DATABASE_URL, or PROD_DATABASE_URL secret is required."
            exit 1
          fi

      - name: Apply message schema compatibility patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260713120000_repair_message_table_renames/migration.sql
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709000000_message_automation_hardening/migration.sql

      - name: Apply idempotent database patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --stdin <<'SQL'
          ALTER TABLE "client" ALTER COLUMN "care_center" DROP NOT NULL;
          ALTER TABLE "client_draft" ADD COLUMN IF NOT EXISTS "confirming_started_at" TIMESTAMPTZ(6);
          ALTER TABLE "message_trigger_job"  ADD COLUMN IF NOT EXISTS "attempts" INTEGER NOT NULL DEFAULT 0;
          ALTER TABLE "message_trigger_job"  ADD COLUMN IF NOT EXISTS "next_attempt_at" TIMESTAMPTZ(6);
          ALTER TABLE "message_trigger_rule" ADD COLUMN IF NOT EXISTS "is_default" BOOLEAN NOT NULL DEFAULT false;
          ALTER TABLE "message_trigger_rule" ADD COLUMN IF NOT EXISTS "jobs_stale" BOOLEAN NOT NULL DEFAULT false;
          UPDATE "message_trigger_rule"
          SET "is_active" = false
          WHERE "is_active" = true
            AND "branch_id" IN (SELECT "id" FROM "branch" WHERE "sms_sender_approval_status" IS DISTINCT FROM 'approved');
          UPDATE "message_trigger_rule" r
          SET "is_default" = true
          WHERE r."is_default" = false
            AND r."template_key" IN ('SERVICE_INFO', 'CLIENT_GREETING')
            AND r."branch_id" IN (SELECT "id" FROM "branch" WHERE "sms_sender_approval_status" IS DISTINCT FROM 'approved')
            AND r."id" = (
              SELECT r2."id" FROM "message_trigger_rule" r2
              WHERE r2."branch_id" = r."branch_id" AND r2."template_key" = r."template_key"
              ORDER BY r2."created_at" ASC LIMIT 1
            );
          UPDATE "message_trigger_job"
          SET "status" = 'canceled', "canceled_at" = now(), "cancel_reason" = '메시지 발송 승인 전 자동 생성 취소'
          WHERE "status" = 'pending'
            AND "branch_id" IN (SELECT "id" FROM "branch" WHERE "sms_sender_approval_status" IS DISTINCT FROM 'approved');
          CREATE UNIQUE INDEX IF NOT EXISTS "uniq_message_trigger_rule_default"
          ON "message_trigger_rule" ("branch_id", "template_key") WHERE "is_default" = true;
          SQL

      - name: Verify database patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --stdin <<'SQL'
          DO $$
          BEGIN
            IF EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'client'
                AND column_name = 'care_center'
                AND is_nullable <> 'YES'
            ) THEN
              RAISE EXCEPTION 'client.care_center is still NOT NULL';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'client_draft'
                AND column_name = 'confirming_started_at'
                AND data_type = 'timestamp with time zone'
                AND is_nullable = 'YES'
            ) THEN
              RAISE EXCEPTION 'client_draft.confirming_started_at is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'message_trigger_job'
                AND column_name = 'attempts'
                AND data_type = 'integer'
                AND is_nullable = 'NO'
                AND column_default = '0'
            ) THEN
              RAISE EXCEPTION 'message_trigger_job.attempts is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'message_trigger_job'
                AND column_name = 'next_attempt_at'
                AND data_type = 'timestamp with time zone'
                AND is_nullable = 'YES'
            ) THEN
              RAISE EXCEPTION 'message_trigger_job.next_attempt_at is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'message_trigger_rule'
                AND column_name = 'is_default'
                AND data_type = 'boolean'
                AND is_nullable = 'NO'
                AND column_default = 'false'
            ) THEN
              RAISE EXCEPTION 'message_trigger_rule.is_default is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM information_schema.columns
              WHERE table_schema = 'public'
                AND table_name = 'message_trigger_rule'
                AND column_name = 'jobs_stale'
                AND data_type = 'boolean'
                AND is_nullable = 'NO'
                AND column_default = 'false'
            ) THEN
              RAISE EXCEPTION 'message_trigger_rule.jobs_stale is missing or has the wrong shape';
            END IF;

            IF NOT EXISTS (
              SELECT 1
              FROM pg_indexes
              WHERE schemaname = 'public'
                AND tablename = 'message_trigger_rule'
                AND indexname = 'uniq_message_trigger_rule_default'
            ) THEN
              RAISE EXCEPTION 'message_trigger_rule.uniq_message_trigger_rule_default index is missing';
            END IF;
          END $$;
          SQL

      - name: Apply eformsign document relation patches
        working-directory: backend
        run: |
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709100000_link_eformsign_and_message_relations/migration.sql
          pnpm exec prisma db execute --schema prisma/schema.prisma --file prisma/migrations/20260709110000_add_message_log_recipient_snapshot/migration.sql

