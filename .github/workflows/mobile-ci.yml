name: Mobile CI

on:
  workflow_dispatch:
  push:
    branches: [ main, dev, preview, "feature/**", "fix/**" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ main, dev, preview, "feature/**", "fix/**" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  verify:
    name: type-check · lint · test · build · e2e
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail fast on the cheapest, most deterministic gate first.
      - name: Type check
        run: pnpm --filter babyjamjam-admin run type-check

      - name: Lint
        run: pnpm --filter babyjamjam-admin run lint

      - name: Unit tests
        run: pnpm --filter babyjamjam-admin test
        env:
          CI: true

      - name: Build
        run: pnpm --filter babyjamjam-admin run build

      - name: Install Playwright browsers
        run: pnpm --filter babyjamjam-admin exec playwright install --with-deps chromium

      - name: Playwright tests
        run: pnpm --filter babyjamjam-admin run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-playwright-report
          path: mobile/playwright-report/
          retention-days: 30
