name: Mobile CI

on:
  workflow_dispatch:
  push:
    branches: [ main, master, develop, dev, preview, "feature/**" ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [ main, master, develop, dev, preview ]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'

jobs:
  verify:
    name: type-check · lint · test
    timeout-minutes: 20
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail fast on the cheapest, most deterministic gate first.
      - name: Type check
        run: pnpm --filter babyjamjam-admin run type-check

      - name: Lint
        run: pnpm --filter babyjamjam-admin run lint

      - name: Unit tests
        run: pnpm --filter babyjamjam-admin test
        env:
          CI: true
