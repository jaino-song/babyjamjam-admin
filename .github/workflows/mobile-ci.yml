name: Mobile CI

on:
  workflow_dispatch:
  push:
    branches: [ main, dev, preview, "feature/**", "fix/**" ]
    paths:
      - 'mobile/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/mobile-ci.yml'
  # No paths filter on pull_request: this job is a REQUIRED check on dev,
  # so it must report on every PR — path-filtered required checks block
  # merges as eternally "expected" when the paths don't match.
  pull_request:
    branches: [ main, dev, preview, "feature/**", "fix/**" ]

jobs:
  verify:
    name: type-check · lint · test · build
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fail fast on the cheapest, most deterministic gate first.
      - name: Type check
        run: pnpm --filter babyjamjam-admin run type-check

      - name: Lint
        run: pnpm --filter babyjamjam-admin run lint

      - name: Unit tests
        run: pnpm --filter babyjamjam-admin test
        env:
          CI: true

      - name: Build
        # The env module (mobile/src/lib/env.ts) fails fast when a production
        # build has no public backend URL. CI builds are compile-only, so a
        # placeholder satisfies validation without implying a real target.
        env:
          NEXT_PUBLIC_API_BASE_URL: https://ci-build.invalid
        run: pnpm --filter babyjamjam-admin run build

  # Manual-only until Phase 6 stands up the real backend stack in CI
  # (Postgres container + migrate deploy + seed + NestJS boot). The suites
  # are backend-coupled and time out without it — verified 2026-06-06.
  e2e:
    name: playwright e2e (manual until real-backend CI lands)
    if: github.event_name == 'workflow_dispatch'
    needs: verify
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter babyjamjam-admin exec playwright install --with-deps chromium

      - name: Playwright tests
        run: pnpm --filter babyjamjam-admin run test:e2e
        env:
          CI: true
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-playwright-report
          path: mobile/playwright-report/
          retention-days: 30
