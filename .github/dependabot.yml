version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      auth-runtime:
        patterns:
          - ioredis
          - nodemailer
          - "@types/nodemailer"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
