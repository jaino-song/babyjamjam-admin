{"openapi":"3.0.0","info":{"title":"eformsign API 가이드","version":"2.0","contact":{"name":"eformsign Service Team","email":"eformsign@forcs.com","url":"https://www.eformsign.com"},"description":"<img src=\"https://www.eformsign.com/images/logo/eformsign.svg\" width=250>\n<br>\n\neformsign이 제공하는 API를 통해 eformsign의 기능을 고객의 시스템/서비스에서 호출해 사용할 수 있습니다.\n\neformsign API는 표준 RESTful API 구조를 따르고 있습니다. 요청 URL, 요청 방식, 요청 Body, 헤더, 인증값을 입력하신 후 RESTful 방식으로 요청(Request)하시면 응답(Response)을 확인하실 수 있습니다.\n\n이 페이지에서 API 호출 테스트를 할 수 있습니다.\n<br> (단, SwaggerHub의 제약 사항으로 인해 문서 목록 조회, 문서 삭제, 그룹 삭제 API의 경우 이 페이지에서 테스트가 불가합니다.)\n\n<b>API 호출 테스트 방법 </b>\n1. 요청 URL을 직접 입력할 필요 없이 Servers 드롭다운에서 서버를 선택합니다. \n2. 인증값을 입력(Authorize 버튼)합니다.\n3. 테스트하고자 하는 API의 'Try it out' 버튼을 클릭합니다.\n4. Parameters와 Request Body를 입력합니다.\n5. 'Execute' 버튼 클릭하면 응답을 확인할 수 있습니다. \n\n\n<br>\n<font size=5><b>시작하기</b></font>\n<img src=\"https://lh3.googleusercontent.com/l3fo5mSL_TKYBl6fvHOgN00g3BQ6cK9v9d6kgAgvcjZDGNbXoL5lzZyNGYjd-Jb4cdteMHpIfTGV_bgBc8Ma_YxjOjm6FBXZCIcMK8Y83z5KL5DBsW6Rrd1E0J8qgP5t7Ejkz8K7ZA=w2400\" width=800>\n- eformsign API 사용을 위해서는 먼저 **API Key 발급** 및 **서명(eformsign_signature) 생성**이 필요합니다. [관련 가이드](https://eformsignkr.github.io/developers/help/eformsign_api.html)를 확인해 주세요.\n- 서명 생성 후 30초 이내에 **Access Token 발급 API를 호출**하여 토큰을 발급해 주세요.\n  - Access Token 발급 API는 **기본 도메인**( https://api.eformsign.com/v2.0 )에서 호출해야 합니다.\n  - 수신한 응답에서 Access Token, Refresh Token, API URL(호출 서버)을 확인해주세요.\n  - 토큰은 3600초(1시간)동안 유효합니다. 유효시간 경과 시, 갱신 혹은 재발급이 필요합니다.\n- 호출하고자 하는 API의 Authorize 헤더에 발급받은 토큰을 입력하고, API별 입력 항목을 입력 후 호출하세요.\n  - Access Token 발급 API를 제외한 모든 API는 **국가별 도메인**에서 호출해야 합니다. 국가별 도메인은 Access Token 발급 시 반환되는 api_key.company.api_url 값을 서버 도메인으로 사용하시면 됩니다.\n\n<br>\n<font size=5><b>API 구조 확인</b></font>\n\n- **요청 URL**: 서버+API 경로(+쿼리) 형태로 이루어져 있습니다. Parameters 영역에 (query), (path)라고 기재된 항목이 있는 경우 URL에 입력되어야 합니다. 각 API 설명에서 요청 URL 예시를 확인하실 수 있습니다.\n- **요청 방식**: 각 API의 경로 좌측에서 확인하실 수 있습니다. POST, GET, PATCH, DELETE를 사용합니다.\n- **인증값**: 모든 API는 Bearer Token 방식의 인증이 필요합니다. API 별로 필요한 인증값이 다르니, **각 API 우측의 자물쇠 버튼**을 눌러 확인해주세요.\n- **요청 Body**: Request body 영역의 Examples 드롭다운 메뉴에서 원하는 예시를 선택하신 후 예시 JSON을 확인하시거나, Schema를 클릭해 JSON 구조를 확인하신 후 JSON 형태로 입력합니다.\n- **헤더**: Content-Type 헤더와 Authorization 헤더가 기본적으로 필요하고, API에 따라 추가 헤더가 필요한 경우도 있습니다.\n  - Content-Type: Request body 영역의 우측 상단에서 확인하실 수 있습니다. 모두 'application/json'을 사용하고 있기에, **Content-Type: application/json** 으로 입력합니다.\n  - Authorization: 위에서 언급한 인증값을 Bearer Token 방식으로 입력하시면 됩니다. **Authorization: Bearer 인증값** 형태로 입력합니다. (만약 사용하시는 API 클라이언트에 별도의 Authorization 입력란이 있다면, 헤더 대신 해당 위치에 입력하세요.)\n  - 그 외: Parameters 영역에 (header)가 기재된 항목이 있는 경우 헤더에 입력되어야 합니다. **Name: Value** 형태로 입력합니다.\n\n<br>  \n<font size=5><b>문제 해결</b></font>\n\nAPI 호출 중 문제가 발생한 경우, 다음 사항들을 확인해보세요.\n\n- 반환되는 **오류 코드를 확인**하고, 각 API별 Responses 섹션이나 [가이드](https://eformsignkr.github.io/developers/help/eformsign_api.html#id33)에서 코드의 의미를 확인해보세요.\n- **API 호출 서버**를 올바르게 입력/선택했는지 확인해보세요. Access Token 발급 API는 기본 도메인에서, 그 외의 API는 국가별 도메인에서 호출하여야 합니다. \n  <img src=\"https://lh3.googleusercontent.com/hil8E_WhcYy1if_335O_JIWu5QapPep0dM_3lgVO--4TGKyLPi82HISC98KSARstni-My7sOX5wYGNIiVMpZF4SQdMmwwKEyEJyjvWkdwshdMLj9_da_czIZmumoW3CVqPS-gmoRBg=w2400\">\n- **인증값**을 올바르게 입력했는지 확인해보세요. Access Token 발급 API와 새 문서 작성 (최초 작성자가 외부자) API의 경우 Base64로 변환한 API Key를, 그 외의 API는 Access Token을 사용합니다.\n- *[Access Token 발급 API]* **execution_time**을 (API 호출 시간이 아닌) **eformsign_signature 생성 시간**으로 올바르게 입력했는지 확인하세요. 또한, eformsign_signature 생성 시간으로부터 **30초 이내**에 호출했는지 확인하세요. 만약 앞의 두 사항을 만족했음에도 오류가 발생한다면, eformsign_signature를 생성하는 컴퓨터 혹은 서버의 시간이 eformsign 서버의 시간과 30초 이상 차이가 발생하는지 확인해보세요. eformsign 서버의 현재 시간은 오류 Response에 함께 반환됩니다.\n- *[인증값으로 Access Token을 사용하는 API]* 토큰을 발급받은 계정에 **해당 작업을 수행할 수 있는 권한**이 있는지 확인해보세요. 예를 들어 새 문서 작성 API의 경우 해당 템플릿의 사용 권한이 있는지, 멤버/그룹 관리 API들의 경우 회사 관리 권한이 있는지 확인해보세요. 토큰 발급 계정으로 eformsign 웹 상에서 해당 작업이 가능해야, API로도 해당 작업을 수행할 수 있습니다.","termsOfService":"https://www.eformsign.com/eform/account/terms.html?tab=0"},"servers":[{"description":"기본 도메인 (모든 회사에서 Access Token 발급 시 사용)","url":"https://api.eformsign.com/v2.0"},{"description":"대한민국 회사용 도메인 (한국 회사에서 그 외 모든 API 호출 시 사용)","url":"https://kr-api.eformsign.com/v2.0"},{"description":"일본 회사용 도메인 (일본 회사에서 그 외 모든 API 호출 시 사용)","url":"https://jp-api.eformsign.com/v2.0"},{"description":"싱가포르 회사용 도메인 (싱가포르 회사에서 그 외 모든 API 호출 시 사용)","url":"https://sg-api.eformsign.com/v2.0"},{"description":"글로벌 회사용 도메인 (한국, 일본, 싱가포르 이외 국적 회사에서 그 외 모든 API 호출 시 사용)","url":"https://global-api.eformsign.com/v2.0"}],"components":{"securitySchemes":{"BearerAPIKey":{"type":"http","scheme":"bearer","description":"eformsign > 커넥트 > API / Webhook에서 발급받은 API Key를 base64로 인코딩한 값을 Bearer 토큰으로 사용하세요.\n\nAccess Token 발급, 새 문서 작성 (최초 작성자가 외부자) 두 종류의 API 호출 시 사용합니다.\n\nex) MjQ3NmU0OGMtNjZlMi00ZGY1LWI0YWYtYmYzZDk1M2UzMGE0 (약 48글자)"},"BearerAccessToken":{"type":"http","scheme":"bearer","description":"Access Token 발급 API를 통해 발급받은 oauth_token.access_token 값을 Bearer 토큰으로 사용하세요.\n\nAccess Token 발급, 새 문서 작성 (최초 작성자가 외부자) 두 종류를 제외한 모든 API 호출 시 사용합니다.\n\nex) eyJhbGciOiJSUzI1NiJ9.eyJpc3MiOiJlZm9ybXNpZ24uaWFtIiwiY29udGV4dCI6eyJjbGllbnRJZCI6IjY4MDk0ZWVhMjVhZjRhNjI5ZTI4 ... (약 800~900글자)"}}},"paths":{"/api_auth/access_token":{"post":{"security":[{"BearerAPIKey":[]}],"operationId":"post-api_auth-access_token","description":"API 키와 eformsign_signature 서명값으로 Access Token을 발급받을 수 있습니다.\n\n기본 도메인에서 호출해주세요. (https://api.eformsign.com/v2.0/api_auth/access_token)","parameters":[{"schema":{"type":"string","example":"304502206b59b0af9a55c19e1216acf0be3b136c487808cd2f6daa7907dcf655554546ff022100ab25d35ef0acd3be42507b680e7abe7325f93a78f53d59ef330cd5fa528f3312"},"in":"header","name":"eformsign_signature","description":"\nAPI 키 생성 시 설정한 검증 유형에 따른 입력값\n1. Bearer token: 'Bearer {토큰값}'\n2. Basic authentication: 'Basic {\"id:password\"를 base64 인코딩한 값}'\n3. eformsign_signature: execution_time 값을 API 비밀키로 서명한 값 (서명 생성 방법: https://eformsignkr.github.io/developers/help/eformsign_api.html#id2)","required":true}],"summary":"Access Token 발급","requestBody":{"content":{"application/json":{"schema":{"type":"object","description":"","properties":{"execution_time":{"type":"integer","format":"int64","description":"eformsign_signature 서명 생성 시간\n\n(Epoch time 형태로 입력해야 하며, 서버시간의 +/- 30초 내에서만 호출이 유효함)"},"member_id":{"type":"string","description":"회사 멤버의 계정 ID로, 특정 멤버의 Access token을 발급받고자 할 때 입력"}},"required":["execution_time"]},"examples":{"회사 멤버의 Access Token 발급":{"value":{"execution_time":1533011071001,"member_id":"eformsign@forcs.com"},"description":"회사 멤버의 Access Token을 발급할 때에는 서명 생성 시간과 멤버 ID를 함께 입력해야 합니다.\n\n호출 시점의 서버 시간과 서명 생성 execution_time의 차이가 30초 이내일 경우에만 Access Token이 발급됩니다."},"멤버 정보 없이 Access Token 발급":{"value":{"execution_time":1533011071001},"description":"멤버 정보 없이 토큰을 발급받을 때는 서명 생성 시간만 입력합니다. \n\n이 토큰으로는 새 문서 작성 등 특정 멤버의 권한 정보가 필요한 API는 이용할 수 없습니다.\n\n호출 시점의 서버 시간과 서명 생성 execution_time의 차이가 30초 이내일 경우에만 Access Token이 발급됩니다."}}}}},"responses":{"200":{"description":"OK","headers":{"Content-Type":{"schema":{"type":"string"},"description":"application/json"}},"content":{"application/json":{"schema":{"type":"object","properties":{"api_key":{"type":"object","description":"API Key 정보로, name, alias, company등의 객체를 포함한다.","properties":{"name":{"type":"string","description":"API Key 이름"},"alias":{"type":"string","description":"API Key 별칭"},"company":{"type":"object","description":"API Key의 회사 정보로, id, name, api_url 객체를 포함한다.","properties":{"id":{"type":"string","description":"회사 ID"},"name":{"type":"string","description":"회사명"},"api_url":{"type":"string","description":"회사의 서비스 API URL"}}}}},"oauth_token":{"type":"object","description":"토큰 정보로, token_type, access_token, refresh_token, expires_in 객체를 포함한다.","properties":{"token_type":{"type":"string","description":"토큰 타입(JWT 고정)"},"access_token":{"type":"string","description":"access token"},"refresh_token":{"type":"string","description":"refresh token"},"expires_in":{"type":"integer","description":"Acces