<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Activities Panel Redesign</title>
  <style>
    :root {
      /* Colors */
      --v3-primary: hsl(214, 100%, 34%);
      --v3-primary-light: hsl(214, 80%, 95%);
      --v3-primary-medium: hsl(214, 70%, 88%);
      --v3-primary-hover: hsl(214, 100%, 28%);
      --v3-green: hsl(137, 34%, 31%);
      --v3-green-light: hsl(137, 40%, 93%);
      --v3-burgundy: hsl(355, 36%, 45%);
      --v3-burgundy-light: hsl(355, 40%, 94%);
      --v3-orange: hsl(34, 100%, 55%);
      --v3-orange-light: hsl(34, 100%, 94%);
      --v3-dark: hsl(214, 40%, 18%);
      --v3-text: hsl(214, 25%, 28%);
      --v3-text-muted: hsl(214, 10%, 55%);
      --v3-border: hsl(214, 20%, 92%);
      --v3-dim-white: hsl(220, 20%, 97%);

      /* Shadows */
      --shadow-v3: 0 4px 24px hsla(214, 50%, 20%, 0.06);

      /* Extras */
      --v3-purple: hsl(267, 50%, 46%);
      --v3-purple-light: hsl(267, 55%, 94%);
      --radius-card: 28px;
      --radius-item: 18px;
      --radius-icon: 14px;
      --radius-pill: 50px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "NanumSquare Neo", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--v3-text);
      background:
        radial-gradient(1200px 450px at -8% -16%, hsla(214, 100%, 34%, 0.16), transparent 56%),
        radial-gradient(760px 320px at 116% 112%, hsla(137, 34%, 31%, 0.12), transparent 58%),
        linear-gradient(150deg, hsl(214, 50%, 99%), var(--v3-dim-white));
      padding: 30px;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(hsla(214, 35%, 32%, 0.09) 0.5px, transparent 0.5px);
      background-size: 3px 3px;
      opacity: 0.22;
    }

    .page-shell {
      width: min(1240px, 100%);
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: grid;
      gap: 18px;
    }

    .card-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--v3-border);
      gap: 18px;
      flex-wrap: wrap;
    }

    .toolbar-left {
      display: grid;
      gap: 5px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title-kicker {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--v3-text-muted);
      font-weight: 700;
    }

    .title-main {
      font-size: 1.125rem;
      font-weight: 800;
      color: var(--v3-dark);
    }

    .state-switch {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--v3-border);
      border-radius: 999px;
      background: #fff;
      padding: 4px;
    }

    .state-button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--v3-text-muted);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
    }

    .state-button:hover {
      color: var(--v3-primary);
      background: var(--v3-primary-light);
    }

    .state-button.is-active {
      color: #fff;
      background: linear-gradient(140deg, var(--v3-primary), var(--v3-primary-hover));
      box-shadow: inset 0 -1px 0 hsla(0, 0%, 100%, 0.25);
    }

    .mobile-view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--v3-border);
      border-radius: 999px;
      padding: 6px;
      width: fit-content;
      background: #fff;
    }

    .mobile-view-button {
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--v3-text-muted);
      background: transparent;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .mobile-view-button svg {
      width: 13px;
      height: 13px;
      stroke-width: 2.6;
    }

    .mobile-view-button.is-active {
      color: #fff;
      background: linear-gradient(140deg, var(--v3-primary), var(--v3-primary-hover));
    }

    .split-card {
      display: grid;
      grid-template-rows: auto 1fr;
      background: #fff;
      border-radius: 28px;
      box-shadow: 0 4px 24px hsla(214, 50%, 20%, 0.06);
      border: 1px solid var(--v3-border);
      overflow: hidden;
      min-height: 760px;
    }

    .panel-track {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      transition: transform 0.36s cubic-bezier(0.2, 0.9, 0.2, 1);
      will-change: transform;
      height: 100%;
    }

    .list-area {
      border-right: 1px solid var(--v3-border);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .list-panel-header {
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--v3-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .list-panel-header h2 {
      color: var(--v3-dark);
      font-size: 1.125rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: var(--radius-pill);
      background: var(--v3-primary-light);
      color: var(--v3-primary);
      font-size: 0.63rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
    }

    .live-dot::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--v3-primary);
      box-shadow: 0 0 0 4px hsla(214, 100%, 34%, 0.2);
    }

    .list-panel-content {
      padding: 18px 18px 24px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
    }

    .sections-wrap {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .list-section {
      display: grid;
      gap: 10px;
    }

    .section-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 8px;
    }

    .section-heading .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
      color: var(--v3-text-muted);
    }

    .count-pill {
      border-radius: var(--radius-pill);
      background: var(--v3-dim-white);
      border: 1px solid var(--v3-border);
      color: var(--v3-text);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 3px 8px;
      min-width: 36px;
      text-align: center;
    }

    .item-stack {
      display: grid;
      gap: 8px;
    }

    .activity-item {
      width: 100%;
      border: 2px solid transparent;
      border-radius: var(--radius-item);
      background: #fff;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px;
      cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease;
      text-align: left;
      color: inherit;
    }

    .activity-item:hover {
      border-color: var(--v3-primary-medium);
      background: var(--v3-primary-light);
      transform: translateY(-1px);
    }

    .activity-item.is-selected {
      background: var(--v3-primary-light);
      border: 2px solid var(--v3-primary);
      box-shadow: inset 0 0 0 1px hsla(214, 100%, 34%, 0.12);
    }

    .item-icon {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-icon);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: 0.98rem;
      flex-shrink: 0;
      box-shadow: inset 0 -8px 12px hsla(0, 0%, 0%, 0.12);
    }

    .item-content {
      min-width: 0;
      flex: 1;
      display: grid;
      gap: 4px;
    }

    .item-title-row {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .item-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--v3-dark);
      line-height: 1.1;
    }

    .reason-badge {
      border-radius: var(--radius-pill);
      font-size: 9px;
      font-weight: 700;
      line-height: 1;
      padding: 4px 8px;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge-burgundy {
      background: var(--v3-burgundy-light);
      color: var(--v3-burgundy);
      border-color: hsla(355, 36%, 45%, 0.2);
    }

    .badge-orange {
      background: var(--v3-orange-light);
      color: hsl(34, 80%, 38%);
      border-color: hsla(34, 100%, 45%, 0.18);
    }

    .badge-blue {
      background: var(--v3-primary-light);
      color: var(--v3-primary);
      border-color: hsla(214, 100%, 34%, 0.18);
    }

    .badge-purple {
      background: var(--v3-purple-light);
      color: var(--v3-purple);
      border-color: hsla(267, 45%, 45%, 0.16);
    }

    .item-sub {
      font-size: 0.7rem;
      color: var(--v3-text-muted);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-arrow {
      color: var(--v3-text-muted);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .item-arrow svg {
      width: 14px;
      height: 14px;
      stroke-width: 2.4;
    }

    .activity-item.is-selected .item-arrow {
      color: var(--v3-primary);
    }

    .overflow-link {
      text-decoration: none;
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--v3-border);
      background: var(--v3-dim-white);
      color: var(--v3-primary);
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 12px;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .overflow-link:hover {
      border-color: var(--v3-primary-medium);
      background: var(--v3-primary-light);
      transform: translateY(-1px);
    }

    .detail-area {
      padding: 26px;
      overflow-y: auto;
    }

    .detail-shell {
      display: grid;
      gap: 18px;
    }

    .detail-hero {
      border-radius: 24px;
      border: 1px solid var(--v3-border);
      background: linear-gradient(130deg, hsla(214, 100%, 34%, 0.1), hsla(214, 80%, 95%, 0.9));
      padding: 20px;
      display: grid;
      gap: 15px;
    }

    .identity-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .hero-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(140deg, var(--v3-primary), var(--v3-primary-hover));
      color: #fff;
      font-size: 1.8rem;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 22px hsla(214, 100%, 34%, 0.2);
      flex-shrink: 0;
    }

    .identity-copy {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .identity-name {
      color: var(--v3-dark);
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .identity-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--v3-text);
      font-size: 0.82rem;
      font-weight: 600;
      flex-wrap: wrap;
    }

    .status-pill {
      border-radius: var(--radius-pill);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.03em;
      line-height: 1;
      padding: 5px 9px;
      border: 1px solid transparent;
      text-transform: uppercase;
    }

    .status-green {
      background: var(--v3-green-light);
      color: var(--v3-green);
      border-color: hsla(137, 34%, 31%, 0.2);
    }

    .status-orange {
      background: var(--v3-orange-light);
      color: hsl(34, 80%, 38%);
      border-color: hsla(34, 100%, 55%, 0.26);
    }

    .status-burgundy {
      background: var(--v3-burgundy-light);
      color: var(--v3-burgundy);
      border-color: hsla(355, 36%, 45%, 0.25);
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .quick-action {
      border: 1px solid var(--v3-primary-medium);
      background: #fff;
      color: var(--v3-primary);
      border-radius: 14px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .quick-action:hover {
      background: var(--v3-primary-light);
      transform: translateY(-1px);
    }

    .quick-action svg {
      width: 13px;
      height: 13px;
      stroke-width: 2.2;
    }

    .info-card {
      border-radius: 22px;
      border: 1px solid var(--v3-border);
      background: #fff;
      padding: 16px 18px;
      display: grid;
      gap: 12px;
    }

    .info-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--v3-text-muted);
      font-weight: 600;
    }

    .info-grid {
      display: grid;
      gap: 8px;
    }

    .info-row {
      display: grid;
      grid-template-columns: 98px minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      font-size: 0.77rem;
      border-bottom: 1px dashed hsla(214, 20%, 84%, 0.8);
      padding-bottom: 7px;
    }

    .info-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .info-key {
      color: var(--v3-text-muted);
      font-weight: 600;
    }

    .info-value {
      color: var(--v3-dark);
      font-weight: 700;
    }

    .state-message {
      border: 1px solid var(--v3-border);
      border-radius: 20px;
      min-height: 260px;
      padding: 22px;
      display: grid;
      place-content: center;
      text-align: center;
      gap: 10px;
    }

    .state-icon {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    .state-icon svg {
      width: 24px;
      height: 24px;
      stroke-width: 2.1;
    }

    .state-title {
      font-size: 0.94rem;
      font-weight: 800;
      color: var(--v3-dark);
      line-height: 1.35;
    }

    .state-subtitle {
      font-size: 0.73rem;
      color: var(--v3-text-muted);
      font-weight: 600;
      line-height: 1.5;
    }

    .state-message.empty {
      background: linear-gradient(130deg, hsl(137, 50%, 97%), #fff);
    }

    .state-message.empty .state-icon {
      background: var(--v3-green-light);
      color: var(--v3-green);
    }

    .state-message.error {
      background: linear-gradient(130deg, hsl(355, 56%, 97%), #fff);
    }

    .state-message.error .state-icon {
      background: var(--v3-burgundy-light);
      color: var(--v3-burgundy);
    }

    .retry-button {
      border: 1px solid hsla(355, 36%, 45%, 0.25);
      background: var(--v3-burgundy-light);
      color: var(--v3-burgundy);
      border-radius: 12px;
      font-size: 0.73rem;
      font-weight: 700;
      padding: 10px 12px;
      cursor: pointer;
      width: fit-content;
      margin: 4px auto 0;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .retry-button:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    .detail-placeholder {
      height: 100%;
      min-height: 360px;
      border: 1px solid var(--v3-border);
      border-radius: 22px;
      display: grid;
      place-content: center;
      text-align: center;
      gap: 8px;
      color: var(--v3-text-muted);
      background: linear-gradient(140deg, hsl(214, 35%, 99%), #fff);
      padding: 16px;
    }

    .detail-placeholder svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.1;
      margin: 0 auto;
    }

    .detail-placeholder p {
      font-size: 0.78rem;
      line-height: 1.5;
      font-weight: 600;
      color: var(--v3-text-muted);
    }

    .loading-stack,
    .detail-loading {
      display: grid;
      gap: 10px;
    }

    .skeleton {
      border-radius: 12px;
      background: linear-gradient(100deg, hsl(214, 16%, 90%) 30%, hsl(214, 12%, 96%) 50%, hsl(214, 16%, 90%) 70%);
      background-size: 220% 100%;
      animation: shimmer 1.35s linear infinite;
    }

    .sk-heading {
      height: 12px;
      width: 90px;
      border-radius: 6px;
      margin: 2px 0 6px 8px;
    }

    .sk-item {
      height: 72px;
      border-radius: var(--radius-item);
    }

    .sk-footer {
      height: 40px;
      border-radius: 14px;
      margin-top: 4px;
    }

    .detail-loading .hero-skeleton {
      height: 156px;
      border-radius: 24px;
    }

    .detail-loading .actions-skeleton {
      height: 42px;
      border-radius: 14px;
    }

    .detail-loading .card-skeleton {
      height: 186px;
      border-radius: 22px;
    }

    @keyframes shimmer {
      0% {
        background-position: 220% 0;
      }

      100% {
        background-position: -220% 0;
      }
    }

    @media (max-width: 1024px) {
      .panel-track {
        grid-template-columns: 360px minmax(0, 1fr);
      }

      .quick-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .info-row {
        grid-template-columns: 90px minmax(0, 1fr);
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 16px;
      }

      .card-toolbar {
        gap: 12px;
        flex-wrap: wrap;
      }

      .toolbar-right {
        width: 100%;
      }

      .state-switch {
        width: 100%;
        justify-content: space-between;
      }

      .state-button {
        flex: 1;
        text-align: center;
        padding: 8px 6px;
      }

      .split-card {
        min-height: 700px;
      }

      .panel-track {
        display: flex;
        width: 200%;
        transform: translateX(0);
      }

      .split-card[data-mobile-view="detail"] .panel-track {
        transform: translateX(-50%);
      }

      .list-area,
      .detail-area {
        flex: 0 0 50%;
        width: 50%;
      }

      .list-area {
        border-right: 0;
      }

      .detail-area {
        padding: 18px;
      }

      .list-panel-header {
        padding: 20px 18px 14px;
      }

      .list-panel-content {
        padding: 14px;
      }

      .info-row {
        grid-template-columns: 86px minmax(0, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <section class="split-layout">
      <div class="split-card" id="splitLayout" data-mobile-view="list">
        <header class="card-toolbar">
          <div class="toolbar-left">
            <p class="title-kicker">Dashboard Activities Panel</p>
            <p class="title-main">활동 패널 리디자인 (SplitLayout)</p>
          </div>

          <div class="toolbar-right">
            <div class="state-switch" role="tablist" aria-label="상태 전환">
              <button type="button" class="state-button is-active" data-state="normal">Normal</button>
              <button type="button" class="state-button" data-state="empty">Empty</button>
              <button type="button" class="state-button" data-state="error">Error</button>
              <button type="button" class="state-button" data-state="loading">Loading</button>
            </div>

            <div class="mobile-view-toggle" aria-label="모바일 패널 전환">
              <button type="button" class="mobile-view-button is-active" data-mobile-view="list">
                <i data-lucide="list"></i>
                목록 보기
              </button>
              <button type="button" class="mobile-view-button" data-mobile-view="detail">
                <i data-lucide="panel-right"></i>
                상세 보기
              </button>
            </div>
          </div>
        </header>

        <div class="panel-track">
          <aside class="list-area">
            <header class="list-panel-header">
              <h2>최근 현황</h2>
              <span class="live-dot">LIVE</span>
            </header>
            <div class="list-panel-content" id="listPanelContent"></div>
          </aside>

          <article class="detail-area">
            <div id="detailPanelContent"></div>
          </article>
        </div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    const appState = {
      mode: "normal",
      selectedClientId: "kim-miyoung",
      mobileView: "list"
    };

    const clients = {
      "park-seoyeon": {
        id: "park-seoyeon",
        section: "action",
        name: "박서연",
        iconColor: "var(--v3-burgundy)",
        badgeLabel: "교체 요청",
        badgeClass: "badge-burgundy",
        subInfo: "산모신생아 · 이영희",
        type: "산모신생아",
        status: "긴급",
        statusClass: "status-burgundy",
        phone: "010-2923-8134",
        address: "서울시 서초구 반포동",
        dueDate: "2026-03-10",
        voucher: "산모신생아",

      },
      "kim-miyoung": {

        badgeClass: "badge-orange",
        subInfo: "산모신생아 · 박지수",
        type: "산모신생아",
        status: "진행중",
        statusClass: "status-green",
        phone: "010-1234-5678",
        address: "서울시 강남구 역삼동",
        dueDate: "2026-03-15",
        voucher: "산모신생아",

        endDate: "2026-03-12",
        staff: "이영희"
      },
      "lee-jieun": {
        id: "lee-jieun",
        section: "action",
        name: "이지은",
        iconColor: "var(--v3-primary)",
        badgeLabel: "발송 대기",
        badgeClass: "badge-blue",
        subInfo: "산모신생아 · 김현수",
        type: "산모신생아",
        status: "진행중",
        statusClass: "status-green",
        phone: "010-5041-1208",
        address: "서울시 송파구 잠실동",
        dueDate: "2026-03-19",
        voucher: "산모신생아",
        period: "25일",
        startDate: "2026-02-18",
        endDate: "2026-03-14",
        staff: "김현수"
      },
      "choi-soojin": {
        id: "choi-soojin",
        section: "upcoming",
        name: "최수진",
        iconColor: "hsl(214, 70%, 45%)",
        badgeLabel: "산모신생아",
        badgeClass: "badge-purple",
        subInfo: "이영희 · 내일",
        type: "산모신생아",
        status: "대기",
        statusClass: "status-orange",
        phone: "010-8644-1938",
        address: "서울시 마포구 성산동",
        dueDate: "2026-03-17",
        voucher: "산모신생아",
        period: "20일",
        startDate: "2026-02-15",
        endDate: "2026-03-06",
        staff: "이영희"
      },
      "han-jimin": {
        id: "han-jimin",
        section: "upcoming",
        name: "한지민",
        iconColor: "hsl(267, 50%, 46%)",
        badgeLabel: "산모신생아",
        badgeClass: "badge-purple",
        subInfo: "박지수 · 3일 후",
        type: "산모신생아",
        status: "대기",
        statusClass: "status-orange",
        phone: "010-7712-3001",
        address: "서울시 성동구 옥수동",
        dueDate: "2026-03-20",
        voucher: "산모신생아",
        period: "25일",
        startDate: "2026-02-18",
        endDate: "2026-03-14",
        staff: "박지수"
      }
    };

    const actionIds = ["park-seoyeon", "kim-miyoung", "lee-jieun"];
    const upcomingIds = ["choi-soojin", "han-jimin"];

    const listPanelContent = document.getElementById("listPanelContent");
    const detailPanelContent = document.getElementById("detailPanelContent");
    const splitLayout = document.getElementById("splitLayout");

    function renderItem(clientId) {
      const client = clients[clientId];
      const selected = appState.selectedClientId === client.id;

      return `
        <button type="button" class="activity-item ${selected ? "is-selected" : ""}" data-client-id="${client.id}">
          <span class="item-icon" style="background:${client.iconColor}">${client.name.slice(0, 1)}</span>
          <span class="item-content">
            <span class="item-title-row">
              <span class="item-title">${client.name}</span>
              <span class="reason-badge ${client.badgeClass}">${client.badgeLabel}</span>
            </span>
            <span class="item-sub">${client.subInfo}</span>
          </span>
          <span class="item-arrow">
            <i data-lucide="chevron-right"></i>
          </span>
        </button>
      `;
    }

    function renderNormalList() {
      listPanelContent.innerHTML = `
        <div class="sections-wrap">
          <section class="list-section">
            <div class="section-heading">
              <span class="label">조치 필요</span>
              <span class="count-pill">3건</span>
            </div>
            <div class="item-stack">
              ${actionIds.map(renderItem).join("")}
            </div>
          </section>

          <section class="list-section">
            <div class="section-heading">
              <span class="label">곧 시작</span>
              <span class="count-pill">2건</span>
            </div>
            <div class="item-stack">
              ${upcomingIds.map(renderItem).join("")}
            </div>
          </section>
        </div>

        <a class="overflow-link" href="#">
          전체 고객 보기 <span aria-hidden="true">→</span>
        </a>
      `;
    }

    function renderEmptyList() {
      listPanelContent.innerHTML = `
        <div class="sections-wrap">
          <div class="state-message empty">
            <span class="state-icon">
              <i data-lucide="check-circle-2"></i>
            </span>
            <p class="state-title">현재 조치가 필요한 항목이 없습니다</p>
            <p class="state-subtitle">새로운 요청이 접수되면 우선순위 순으로 표시됩니다.</p>
          </div>
        </div>

        <a class="overflow-link" href="#">
          전체 고객 보기 <span aria-hidden="true">→</span>
        </a>
      `;
    }

    function renderErrorList() {
      listPanelContent.innerHTML = `
        <div class="sections-wrap">
          <div class="state-message error">
            <span class="state-icon">
              <i data-lucide="alert-triangle"></i>
            </span>
            <p class="state-title">데이터를 불러올 수 없습니다</p>
            <p class="state-subtitle">네트워크 상태를 확인한 뒤 다시 시도해 주세요.</p>
            <button type="button" class="retry-button" data-action="retry">다시 시도</button>
          </div>
        </div>

        <a class="overflow-link" href="#">
          전체 고객 보기 <span aria-hidden="true">→</span>
        </a>
      `;
    }

    function renderLoadingList() {
      listPanelContent.innerHTML = `
        <div class="loading-stack">
          <span class="skeleton sk-heading"></span>
          <span class="skeleton sk-item"></span>
          <span class="skeleton sk-item"></span>
          <span class="skeleton sk-item"></span>
          <span class="skeleton sk-heading"></span>
          <span class="skeleton sk-item"></span>
          <span class="skeleton sk-item"></span>
        </div>
        <span class="skeleton sk-footer"></span>
      `;
    }

    function renderDetailCard(client) {
      detailPanelContent.innerHTML = `
        <div class="detail-shell">
          <section class="detail-hero">
            <div class="identity-row">
              <span class="hero-avatar">${client.name.slice(0, 1)}</span>
              <div class="identity-copy">
                <p class="identity-name">${client.name}</p>
                <div class="identity-meta">
                  <span>${client.type}</span>
                  <span>·</span>
                  <span class="status-pill ${client.statusClass}">${client.status}</span>
                </div>
              </div>
            </div>

            <div class="quick-actions">
              <button type="button" class="quick-action"><i data-lucide="phone"></i>전화</button>
              <button type="button" class="quick-action"><i data-lucide="message-circle"></i>메시지</button>
              <button type="button" class="quick-action"><i data-lucide="user-round"></i>고객상세</button>
              <button type="button" class="quick-action"><i data-lucide="file-text"></i>계약</button>
            </div>
          </section>

          <section class="info-card">
            <p class="info-title">기본 정보</p>
            <div class="info-grid">
              <div class="info-row"><span class="info-key">이름</span><span class="info-value">${client.name}</span></div>
              <div class="info-row"><span class="info-key">연락처</span><span class="info-value">${client.phone}</span></div>
              <div class="info-row"><span class="info-key">주소</span><span class="info-value">${client.address}</span></div>
              <div class="info-row"><span class="info-key">출산예정일</span><span class="info-value">${client.dueDate}</span></div>
            </div>
          </section>

          <section class="info-card">
            <p class="info-title">서비스 정보</p>
            <div class="info-grid">
              <div class="info-row"><span class="info-key">바우처 유형</span><span class="info-value">${client.voucher}</span></div>
              <div class="info-row"><span class="info-key">기간</span><span class="info-value">${client.period}</span></div>
              <div class="info-row"><span class="info-key">시작일</span><span class="info-value">${client.startDate}</span></div>
              <div class="info-row"><span class="info-key">종료일</span><span class="info-value">${client.endDate}</span></div>
              <div class="info-row"><span class="info-key">담당 직원</span><span class="info-value">${client.staff}</span></div>
            </div>
          </section>
        </div>
      `;
    }

    function renderDetailPlaceholder(type) {
      if (type === "empty") {
        detailPanelContent.innerHTML = `
          <div class="detail-placeholder">
            <i data-lucide="inbox"></i>
            <p>표시할 상세 정보가 없습니다.<br>새 항목이 등록되면 즉시 확인할 수 있습니다.</p>
          </div>
        `;
        return;
      }

      if (type === "error") {
        detailPanelContent.innerHTML = `
          <div class="detail-placeholder">
            <i data-lucide="shield-alert"></i>
            <p>상세 정보를 불러오지 못했습니다.<br>리스트 패널에서 다시 시도해 주세요.</p>
          </div>
        `;
        return;
      }

      detailPanelContent.innerHTML = `
        <div class="detail-loading">
          <span class="skeleton hero-skeleton"></span>
          <span class="skeleton actions-skeleton"></span>
          <span class="skeleton card-skeleton"></span>
          <span class="skeleton card-skeleton"></span>
        </div>
      `;
    }

    function updateControlState() {
      document.querySelectorAll(".state-button").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.state === appState.mode);
      });

      document.querySelectorAll(".mobile-view-button").forEach((button) => {
        button.classList.toggle("is-active", button.dataset.mobileView === appState.mobileView);
      });
    }

    function render() {
      updateControlState();
      splitLayout.dataset.mobileView = appState.mobileView;

      if (appState.mode === "normal") {
        renderNormalList();
        renderDetailCard(clients[appState.selectedClientId]);
      } else if (appState.mode === "empty") {
        renderEmptyList();
        renderDetailPlaceholder("empty");
      } else if (appState.mode === "error") {
        renderErrorList();
        renderDetailPlaceholder("error");
      } else {
        renderLoadingList();
        renderDetailPlaceholder("loading");
      }

      lucide.createIcons();
    }

    document.addEventListener("click", (event) => {
      const stateButton = event.target.closest(".state-button");
      if (stateButton) {
        appState.mode = stateButton.dataset.state;
        appState.mobileView = "list";
        render();
        return;
      }

      const mobileButton = event.target.closest(".mobile-view-button");
      if (mobileButton) {
        appState.mobileView = mobileButton.dataset.mobileView;
        render();
        return;
      }

      const itemButton = event.target.closest(".activity-item");
      if (itemButton && appState.mode === "normal") {
        appState.selectedClientId = itemButton.dataset.clientId;
        if (window.matchMedia("(max-width: 768px)").matches) {
          appState.mobileView = "detail";
        }
        render();
        return;
      }

      const retryButton = event.target.closest("[data-action='retry']");
      if (retryButton) {
        appState.mode = "normal";
        appState.mobileView = "list";
        render();
        return;
      }

      const overflowLink = event.target.closest(".overflow-link");
      if (overflowLink) {
        event.preventDefault();
      }
    });

    window.addEventListener("resize", () => {
      if (window.innerWidth > 768) {
        appState.mobileView = "list";
      }
      splitLayout.dataset.mobileView = appState.mobileView;
      updateControlState();
    });

    render();
  </script>
</body>
</html>
