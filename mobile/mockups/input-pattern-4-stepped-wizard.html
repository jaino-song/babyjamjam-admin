<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pattern 4 — Stepped Wizard</title>
  <style>
    :root {
      --v3-primary: hsl(214, 100%, 34%); --v3-primary-light: hsl(214, 80%, 95%);
      --v3-primary-medium: hsl(214, 70%, 88%); --v3-primary-hover: hsl(214, 100%, 28%);
      --v3-green: hsl(137, 34%, 31%); --v3-green-light: hsl(137, 40%, 93%);
      --v3-burgundy: hsl(355, 36%, 45%); --v3-burgundy-light: hsl(355, 40%, 94%);
      --v3-orange: hsl(34, 100%, 55%); --v3-orange-light: hsl(34, 100%, 94%);
      --v3-purple: hsl(270, 60%, 55%); --v3-purple-light: hsl(270, 60%, 94%);
      --v3-dark: hsl(214, 40%, 18%); --v3-text: hsl(214, 25%, 28%);
      --v3-text-muted: hsl(214, 10%, 55%); --v3-border: hsl(214, 20%, 92%);
      --v3-dim-white: hsl(220, 20%, 97%);
      --shadow-v3: 0 4px 24px hsla(214, 50%, 20%, 0.06);
      --shadow-v3-hover: 0 12px 48px hsla(214, 50%, 20%, 0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, "Noto Sans KR", sans-serif; color: var(--v3-text); background: var(--v3-dim-white); display: flex; }

    .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 280px; background: #fff; z-index: 40; border-radius: 0 32px 32px 0; box-shadow: var(--shadow-v3); display: flex; flex-direction: column; }
    .sidebar-brand { display: flex; align-items: center; gap: 12px; padding: 32px 24px 24px; }
    .sidebar-brand .icon-box { width: 48px; height: 48px; border-radius: 12px; background: var(--v3-primary); display: flex; align-items: center; justify-content: center; }
    .sidebar-brand .icon-box svg { width: 24px; height: 24px; color: #fff; }
    .sidebar-brand span { font-size: 1.25rem; font-weight: 800; color: var(--v3-dark); }
    .sidebar nav { flex: 1; overflow-y: auto; padding: 8px 16px; }
    .nav-section { margin-bottom: 24px; }
    .nav-section h3 { padding: 0 16px; margin-bottom: 8px; font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; color: var(--v3-text-muted); }
    .nav-section ul { list-style: none; }
    .nav-item a { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 16px; font-size: 0.85rem; font-weight: 500; color: var(--v3-text); text-decoration: none; transition: all 0.2s; }
    .nav-item a:hover { background: var(--v3-primary-light); color: var(--v3-primary); }
    .nav-item.active a { background: var(--v3-primary); color: #fff; box-shadow: 0 4px 12px hsla(214,100%,34%,0.2); }
    .nav-item a svg { width: 20px; height: 20px; flex-shrink: 0; }
    .sidebar-profile { padding: 16px; margin-top: auto; }
    .sidebar-profile .profile-card { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 16px; background: var(--v3-dim-white); border: 1px solid var(--v3-border); }
    .profile-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, var(--v3-primary), hsl(217,91%,60%)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 0.85rem; flex-shrink: 0; }
    .profile-name { font-size: 0.85rem; font-weight: 600; color: var(--v3-dark); }
    .profile-role { font-size: 0.7rem; color: var(--v3-text-muted); }
    .main { margin-left: 280px; padding: 32px; flex: 1; min-height: 100vh; }

    /* ============================
       PATTERN: Stepped Wizard
       (replaces entire main content)
       ============================ */
    .wizard-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; font-weight: 600; color: var(--v3-text-muted);
      text-decoration: none; margin-bottom: 24px; transition: color 0.2s; cursor: pointer;
      background: none; border: none; font-family: inherit;
    }
    .wizard-back:hover { color: var(--v3-primary); }
    .wizard-back svg { width: 20px; height: 20px; }

    .wizard-card {
      background: #fff; border-radius: 28px; box-shadow: var(--shadow-v3);
      padding: 0; overflow: hidden; max-width: 720px; margin: 0 auto;
    }
    .wizard-header {
      padding: 32px 32px 0;
      text-align: center;
    }
    .wizard-title { font-size: 1.25rem; font-weight: 800; color: var(--v3-dark); margin-bottom: 4px; }
    .wizard-subtitle { font-size: 0.8rem; color: var(--v3-text-muted); margin-bottom: 28px; }

    .wizard-steps {
      display: flex; align-items: center; justify-content: center; gap: 0;
      padding: 0 48px 28px;
    }
    .step-item {
      display: flex; align-items: center; gap: 8px;
    }
    .step-dot {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; transition: all 0.3s;
    }
    .step-dot.completed {
      background: var(--v3-primary); color: #fff;
      box-shadow: 0 2px 8px hsla(214,100%,34%,0.2);
    }
    .step-dot.current {
      background: var(--v3-primary); color: #fff;
      box-shadow: 0 2px 12px hsla(214,100%,34%,0.3);
      transform: scale(1.1);
    }
    .step-dot.pending {
      background: var(--v3-dim-white); color: var(--v3-text-muted);
      border: 2px solid var(--v3-border);
    }
    .step-label { font-size: 0.75rem; font-weight: 600; color: var(--v3-text-muted); }
    .step-item.active .step-label { color: var(--v3-primary); font-weight: 700; }
    .step-item.done .step-label { color: var(--v3-dark); }
    .step-connector {
      width: 48px; height: 2px; margin: 0 8px;
      border-radius: 2px;
    }
    .step-connector.done { background: var(--v3-primary); }
    .step-connector.pending { background: var(--v3-border); }

    .wizard-body { padding: 0 32px 32px; }
    .wizard-section-title {
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--v3-text-muted); font-weight: 600; margin-bottom: 20px;
    }
    .wizard-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 0.75rem; font-weight: 600; color: var(--v3-text-muted); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 12px 16px; border-radius: 14px;
      border: 1.5px solid var(--v3-border); background: #fff;
      font-size: 0.85rem; font-family: inherit; color: var(--v3-dark);
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--v3-primary);
      box-shadow: 0 0 0 3px hsla(214,100%,34%,0.08);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .completed-field {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-radius: 14px;
      background: var(--v3-green-light); border: 1.5px solid hsl(137, 40%, 85%);
    }
    .completed-field svg { width: 16px; height: 16px; color: var(--v3-green); flex-shrink: 0; }
    .completed-field span { font-size: 0.85rem; font-weight: 600; color: var(--v3-dark); }

    .wizard-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px; border-top: 1px solid var(--v3-border);
    }
    .btn-back {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 14px; border: 1.5px solid var(--v3-border);
      background: #fff; font-size: 0.85rem; font-weight: 600;
      color: var(--v3-text-muted); cursor: pointer; font-family: inherit; transition: all 0.2s;
    }
    .btn-back:hover { border-color: var(--v3-text-muted); }
    .btn-back svg { width: 16px; height: 16px; }
    .btn-next {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 28px; border-radius: 14px; border: none;
      background: var(--v3-primary); font-size: 0.85rem; font-weight: 700;
      color: #fff; cursor: pointer; font-family: inherit;
      transition: all 0.2s; box-shadow: 0 2px 8px hsla(214,100%,34%,0.2);
    }
    .btn-next:hover { background: var(--v3-primary-hover); transform: translateY(-1px); }
    .btn-next svg { width: 16px; height: 16px; }
    .step-progress-text { font-size: 0.75rem; color: var(--v3-text-muted); font-weight: 600; }

    .annotation { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--v3-dark); color: #fff; padding: 12px 24px; border-radius: 16px; font-size: 0.8rem; font-weight: 600; box-shadow: 0 8px 32px rgba(0,0,0,0.2); z-index: 100; text-align: center; line-height: 1.5; }
    .annotation strong { color: hsl(214,80%,70%); }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand"><div class="icon-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg></div><span>케어허브</span></div>
  <nav>
    <div class="nav-section"><h3>메인</h3><ul>
      <li class="nav-item"><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="2"/><rect x="14" y="3" width="7" height="7" rx="2"/><rect x="3" y="14" width="7" height="7" rx="2"/><rect x="14" y="14" width="7" height="7" rx="2"/></svg>대시보드</a></li>
    </ul></div>
    <div class="nav-section"><h3>관리</h3><ul>
      <li class="nav-item active"><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/></svg>고객</a></li>
      <li class="nav-item"><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>직원</a></li>
    </ul></div>
    <div class="nav-section"><h3>문서</h3><ul>
      <li class="nav-item"><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>계약</a></li>
    </ul></div>
    <div class="nav-section"><h3>시스템</h3><ul>
      <li class="nav-item"><a href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>설정</a></li>
    </ul></div>
  </nav>
  <div class="sidebar-profile"><div class="profile-card"><div class="profile-avatar">김대</div><div><div class="profile-name">김대표</div><div class="profile-role">관리자</div></div></div></div>
</aside>

<main class="main">
  <button class="wizard-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    고객 목록으로 돌아가기
  </button>

  <div class="wizard-card">
    <div class="wizard-header">
      <div class="wizard-title">새 고객 등록</div>
      <div class="wizard-subtitle">고객 정보를 단계별로 입력해 주세요</div>

      <div class="wizard-steps">
        <div class="step-item done">
          <div class="step-dot completed">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="14" height="14"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <span class="step-label">기본 정보</span>
        </div>
        <div class="step-connector done"></div>
        <div class="step-item active">
          <div class="step-dot current">2</div>
          <span class="step-label">서비스 설정</span>
        </div>
        <div class="step-connector pending"></div>
        <div class="step-item">
          <div class="step-dot pending">3</div>
          <span class="step-label">계약 발송</span>
        </div>
      </div>
    </div>

    <div class="wizard-body">
      <div style="background:var(--v3-green-light);border-radius:18px;padding:16px;margin-bottom:24px;">
        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--v3-green);font-weight:600;margin-bottom:12px;">✓ 1단계 완료 — 기본 정보</div>
        <div style="display:flex;gap:24px;flex-wrap:wrap;">
          <div class="completed-field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>김새롬</span></div>
          <div class="completed-field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>010-9876-5432</span></div>
          <div class="completed-field"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>서울 마포구 와우산로 94</span></div>
        </div>
      </div>

      <div class="wizard-section-title">2단계 — 서비스 설정</div>
      <div class="wizard-form-grid">
        <div class="form-group">
          <label>바우처 유형</label>
          <select><option value="">선택하세요</option><option selected>산후도우미</option><option>가사도우미</option><option>간병도우미</option></select>
        </div>
        <div class="form-group">
          <label>서비스 기간 (일)</label>
          <input type="number" value="30">
        </div>
        <div class="form-group">
          <label>시작일</label>
          <input type="date" value="2026-03-01">
        </div>
        <div class="form-group">
          <label>종료일</label>
          <input type="date" value="2026-03-31">
        </div>
        <div class="form-group">
          <label>담당 직원 (주)</label>
          <select><option value="">선택하세요</option><option selected>정수진</option><option>이지은</option><option>박현우</option></select>
        </div>
        <div class="form-group">
          <label>담당 직원 (부)</label>
          <select><option value="">선택하세요</option><option>정수진</option><option selected>이지은</option><option>박현우</option></select>
        </div>
        <div class="form-group full">
          <label>메모</label>
          <textarea placeholder="특이사항이 있으면 입력하세요"></textarea>
        </div>
      </div>
    </div>

    <div class="wizard-footer">
      <button class="btn-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        이전
      </button>
      <span class="step-progress-text">2 / 3 단계</span>
      <button class="btn-next">
        다음
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>
</main>

<div class="annotation">
  <strong>Pattern 4 — Stepped Wizard</strong><br>
  전체 페이지를 활용한 단계별 입력. 복잡한 등록 플로우에 적합. 이전 단계 요약 표시.
</div>

</body>
