<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>회원가입 — Mobile Page</title>
<link rel="stylesheet" href="_shared.css?v=frame-removal" />
<style>
.auth-page {
  min-height: 100%;
  background: linear-gradient(180deg, #fff 0%, var(--v3-dim-white) 60%);
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.auth-back {
  display: inline-flex; align-items: center;
  background: none; border: 0;
  color: var(--v3-text-muted);
  font-size: 0.78rem; font-weight: 600;
  cursor: pointer;
  padding: 6px 0;
  gap: 4px;
  margin-bottom: 10px;
  align-self: flex-start;
}
.auth-brand {
  display: flex; flex-direction: column; align-items: center;
  padding: 24px 0;
}
.auth-logo { width: 80px; height: 80px; margin-bottom: 12px; }
.auth-logo img { width: 100%; height: 100%; object-fit: contain; }

.auth-title {
  font-size: 1.3rem; font-weight: 800;
  color: var(--v3-primary);
  margin-bottom: 4px;
}
.auth-sub {
  font-size: 0.78rem;
  color: var(--v3-text-muted);
}

.auth-title { text-align: center; }
.auth-sub { text-align: center; line-height: 1.5; margin-bottom: 6px; }

/* Step indicator */
.step-indicator {
  display: flex; align-items: center; justify-content: center;
  gap: 6px;
  margin-bottom: 18px;
}
.step-dot {
  width: 18px; height: 4px;
  border-radius: 999px;
  background: var(--v3-border);
}
.step-dot.active { background: var(--v3-primary); width: 26px; }
.step-dot.done { background: var(--v3-primary); }
.step-count {
  font-size: 0.62rem;
  font-weight: 700;
  color: var(--v3-text-muted);
  margin-left: 4px;
  letter-spacing: 0.04em;
}

.auth-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.auth-input-group { display: flex; flex-direction: column; gap: 6px; }
.auth-label {
  font-size: 0.7rem; font-weight: 700;
  color: var(--v3-text-muted);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.auth-input {
  width: 100%;
  padding: 13px 16px;
  border: 1px solid var(--v3-border);
  border-radius: 14px;
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--v3-dark);
  background: white;
  outline: none;
  box-sizing: border-box;
}
.auth-input:focus { border-color: var(--v3-primary); }
.auth-input.has-trailing { padding-right: 90px; }
.auth-input-wrap { position: relative; }
.auth-input-trailing {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.6rem; font-weight: 700;
  background: hsl(50, 100%, 88%);
  color: hsl(45, 70%, 30%);
  padding: 2px 6px;
  border-radius: 999px;
}
.auth-helper { font-size: 0.66rem; color: var(--v3-text-muted); }
.auth-helper.error { color: var(--v3-burgundy); font-weight: 600; }
.auth-helper.ok { color: var(--v3-green); font-weight: 600; }

/* Select dropdown */
.auth-select-wrap { position: relative; }
.auth-select {
  width: 100%;
  padding: 13px 40px 13px 16px;
  border: 1px solid var(--v3-border);
  border-radius: 14px;
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--v3-dark);
  background: white;
  outline: none;
  box-sizing: border-box;
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  cursor: pointer;
}
.auth-select-chev {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  pointer-events: none;
  color: var(--v3-text-muted);
}

/* Password strength */
.pw-strength {
  background: var(--v3-dim-white);
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 0.66rem;
  color: var(--v3-text-muted);
  display: flex; flex-direction: column; gap: 3px;
}
.pw-strength-row { display: flex; align-items: center; gap: 6px; }
.pw-strength-row.ok { color: var(--v3-green); }
.pw-strength-row .dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--v3-border);
}
.pw-strength-row.ok .dot { background: var(--v3-green); }

/* Action buttons */
.auth-actions {
  display: flex; gap: 8px;
  margin-top: 16px;
}
.auth-btn {
  flex: 2;
  padding: 13px;
  border: 0;
  border-radius: 14px;
  background: var(--v3-primary);
  color: white;
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  gap: 4px;
}
.auth-btn.secondary {
  flex: 1;
  background: var(--v3-dim-white);
  color: var(--v3-text);
  border: 1px solid var(--v3-border);
}
.auth-btn.full { flex: 1; box-shadow: 0 6px 20px rgba(20, 50, 100, 0.18); }
.auth-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

.auth-footer-link {
  margin-top: 18px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--v3-text-muted);
}
.auth-footer-link a { color: var(--v3-primary); font-weight: 700; text-decoration: none; }

/* Success screen */
.auth-status {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; padding-top: 8px;
}
.status-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
}
.status-icon.success { background: var(--v3-green-light); color: var(--v3-green); }
.status-message {
  font-size: 0.86rem;
  color: var(--v3-dark);
  line-height: 1.55;
}
.status-message + .status-message {
  font-size: 0.74rem;
  color: var(--v3-text-muted);
  margin-top: 6px;
}

/* Step views */
.auth-step-view { display: none; }
.auth-step-view.active { display: block; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="auth-page">
      <div class="auth-brand">
        <div class="auth-logo"><img src="logo.svg" alt="아가잼잼 로고" /></div>
        <div class="auth-title">회원가입</div>
        <div class="auth-sub">필수 정보를 단계별로 입력해 주세요.</div>
      </div>

      <div class="step-indicator">
        <span class="step-dot active" data-dot="1"></span>
        <span class="step-dot" data-dot="2"></span>
        <span class="step-dot" data-dot="3"></span>
        <span class="step-count" id="stepCount">1 / 3</span>
      </div>

      <!-- STEP 1: 계정 정보 -->
      <div class="auth-step-view active" data-step="1">
        <form class="auth-form" onsubmit="event.preventDefault(); next();">
          <div class="auth-input-group">
            <label class="auth-label" for="r-email">이메일</label>
            <div class="auth-input-wrap">
              <input class="auth-input has-trailing" id="r-email" type="email" placeholder="example@email.com" autocomplete="email" value="songjinho@agajamjam.kr" />
              <span class="auth-input-trailing">카카오 연결 가능</span>
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label" for="r-name">이름</label>
            <input class="auth-input" id="r-name" type="text" placeholder="이름 입력" autocomplete="name" value="송진호" />
          </div>

          <div class="auth-input-group">
            <label class="auth-label" for="r-pw">비밀번호</label>
            <input class="auth-input" id="r-pw" type="password" placeholder="8자 이상" autocomplete="new-password" value="••••••••••" />
            <div class="pw-strength">
              <div class="pw-strength-row ok"><span class="dot"></span>최소 8자 이상</div>
              <div class="pw-strength-row ok"><span class="dot"></span>대/소문자 포함</div>
              <div class="pw-strength-row ok"><span class="dot"></span>숫자 포함</div>
              <div class="pw-strength-row"><span class="dot"></span>특수문자 1개 이상</div>
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label" for="r-pw-confirm">비밀번호 확인</label>
            <input class="auth-input" id="r-pw-confirm" type="password" placeholder="비밀번호 다시 입력" autocomplete="new-password" value="••••••••••" />
            <div class="auth-helper ok">✓ 비밀번호가 일치합니다.</div>
          </div>

          <div class="auth-actions">
            <button type="submit" class="auth-btn full">
              다음
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </form>
      </div>

      <!-- STEP 2: 개인 정보 -->
      <div class="auth-step-view" data-step="2">
        <form class="auth-form" onsubmit="event.preventDefault(); next();">
          <div class="auth-input-group">
            <label class="auth-label" for="r-phone">전화번호</label>
            <input class="auth-input" id="r-phone" type="tel" placeholder="010-1234-5678" inputmode="numeric" maxlength="13" autocomplete="tel" value="010-2345-6789" />
            <div class="auth-helper ok">✓ 사용 가능한 번호입니다.</div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label" for="r-birth">생년월일</label>
            <input class="auth-input" id="r-birth" type="text" placeholder="1990-01-01" inputmode="numeric" maxlength="10" autocomplete="bday" value="1985-09-12" />
            <div class="auth-helper">YYYY-MM-DD 형식으로 입력해 주세요.</div>
          </div>

          <div class="auth-actions">
            <button type="button" class="auth-btn secondary" onclick="prev()">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
              이전
            </button>
            <button type="submit" class="auth-btn">
              다음
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </form>
      </div>

      <!-- STEP 3: 지점 · 역할 -->
      <div class="auth-step-view" data-step="3">
        <form class="auth-form" onsubmit="event.preventDefault(); next();">
          <div class="auth-input-group">
            <label class="auth-label" for="r-branch">지점명</label>
            <div class="auth-select-wrap">
              <select class="auth-select" id="r-branch">
                <option value="">지점을 선택해주세요</option>
                <option selected>인천점</option>
                <option>서울 강동점</option>
                <option>서울 강남점</option>
                <option>부천점</option>
                <option>인천 연수점</option>
                <option>안양점</option>
              </select>
              <svg class="auth-select-chev" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>

          <div class="auth-input-group">
            <label class="auth-label" for="r-role">역할</label>
            <div class="auth-select-wrap">
              <select class="auth-select" id="r-role">
                <option value="">역할을 선택해주세요</option>
                <option selected>지점장</option>
                <option>매니저</option>
                <option>상담원</option>
              </select>
              <svg class="auth-select-chev" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="auth-helper">선택한 지점의 관리자가 가입을 승인해야 합니다.</div>
          </div>

          <div class="auth-actions">
            <button type="button" class="auth-btn secondary" onclick="prev()">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
              이전
            </button>
            <button type="submit" class="auth-btn">회원가입</button>
          </div>
        </form>
      </div>

      <!-- STEP 4: 가입 완료 -->
      <div class="auth-step-view" data-step="4">
        <div class="auth-status">
          <div class="status-icon success">
            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="status-message"><strong style="color: var(--v3-primary);">회원가입 완료!</strong></div>
          <div class="status-message">인증 이메일이 발송되었습니다.<br/>이메일을 확인하여 계정을 활성화해 주세요.</div>
        </div>

        <div class="auth-actions" style="margin-top: 28px;">
          <button class="auth-btn full" onclick="goLogin()">로그인 페이지로 이동</button>
        </div>
      </div>

      <div class="auth-footer-link" id="footerLink">
        이미 계정이 있으신가요? <a href="#" onclick="goLogin()">로그인</a>
      </div>
    </div>
  </div>
</div>
<div class="variant-label">회원가입 · /register (3-step wizard + success)</div>
<script>
let step = 1;
const TOTAL = 3;
function render(){
  document.querySelectorAll('.auth-step-view').forEach(v=>{
    v.classList.toggle('active', parseInt(v.dataset.step,10) === step);
  });
  document.querySelectorAll('.step-dot').forEach(d=>{
    const i = parseInt(d.dataset.dot,10);
    d.classList.toggle('active', i === step);
    d.classList.toggle('done', i < step && step <= TOTAL);
  });
  const indicator = document.querySelector('.step-indicator');
  const footer = document.getElementById('footerLink');
  indicator.style.display = step <= TOTAL ? 'flex' : 'none';
  footer.style.display = step <= TOTAL ? 'block' : 'none';
  document.getElementById('stepCount').textContent = `${step} / ${TOTAL}`;
  window.scrollTo(0, 0);
}
function next(){ step = Math.min(step + 1, 4); render(); }
function prev(){ if(step > 1 && step <= TOTAL) { step--; render(); } }
function goLogin(){
  step = 1; render();
}
render();
</script>
</body>
</html>
