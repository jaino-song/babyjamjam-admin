<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>파일 업로드 — Mobile Page</title>
<link rel="stylesheet" href="_shared.css?v=frame-removal" />
<link rel="stylesheet" href="_shell.css" />
<style>
.upload-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px 100px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.dropzone {
  border: 2px dashed var(--v3-border);
  border-radius: 18px;
  background: white;
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.dropzone:hover {
  border-color: var(--v3-primary);
  background: var(--v3-primary-light);
}
.dropzone.has-file {
  padding: 14px;
  text-align: left;
  border-style: solid;
  border-color: var(--v3-primary-medium);
  background: white;
}
.dropzone-icon {
  width: 52px; height: 52px;
  border-radius: 16px;
  background: var(--v3-primary-light);
  color: var(--v3-primary);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
}
.dropzone-title {
  font-size: 0.92rem; font-weight: 700;
  color: var(--v3-dark);
  margin-bottom: 4px;
}
.dropzone-sub {
  font-size: 0.7rem;
  color: var(--v3-text-muted);
  line-height: 1.45;
}
.dropzone-sub b { color: var(--v3-primary); font-weight: 700; }

.file-preview {
  display: flex; align-items: center; gap: 12px;
}
.file-preview-icon {
  width: 48px; height: 48px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.file-preview-icon.pdf { background: var(--v3-burgundy-light); color: var(--v3-burgundy); }
.file-preview-icon.img { background: var(--v3-green-light); color: var(--v3-green); }
.file-preview-info { flex: 1; min-width: 0; }
.file-preview-name {
  font-size: 0.88rem; font-weight: 700;
  color: var(--v3-dark);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.file-preview-meta {
  font-size: 0.66rem;
  color: var(--v3-text-muted);
  margin-top: 2px;
}
.file-preview-remove {
  background: var(--v3-burgundy-light);
  color: var(--v3-burgundy);
  border: 0;
  width: 32px; height: 32px;
  border-radius: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.upload-progress {
  height: 4px;
  background: var(--v3-border);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 10px;
}
.upload-progress-bar {
  height: 100%;
  width: 68%;
  background: var(--v3-primary);
  border-radius: 999px;
  transition: width 0.3s;
}
.upload-progress-meta {
  font-size: 0.6rem;
  color: var(--v3-text-muted);
  margin-top: 4px;
  display: flex; justify-content: space-between;
}

/* Form card (reused from wizard) */
.form-card {
  background: white;
  border-radius: 16px;
  padding: 12px 14px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.form-row { margin-bottom: 12px; }
.form-row:last-child { margin-bottom: 0; }
.form-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--v3-text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.form-label .req { color: var(--v3-burgundy); margin-left: 2px; }
.form-input, .form-textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--v3-border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 0.85rem;
  color: var(--v3-dark);
  background: var(--v3-dim-white);
  outline: none;
  box-sizing: border-box;
}
.form-input.filled { background: white; border-color: var(--v3-border); }
.form-textarea { min-height: 80px; resize: vertical; line-height: 1.55; }
.form-input:focus, .form-textarea:focus { border-color: var(--v3-primary); background: white; }
.form-helper {
  font-size: 0.65rem;
  color: var(--v3-text-muted);
  margin-top: 4px;
}

.category-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.category-chip {
  padding: 10px 8px;
  border: 1px solid var(--v3-border);
  border-radius: 10px;
  background: white;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--v3-text);
}
.category-chip.selected {
  background: var(--v3-primary-light);
  border-color: var(--v3-primary);
  color: var(--v3-primary);
}
.category-chip-icon {
  width: 24px; height: 24px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.tag-input-wrap {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 8px 10px;
  border: 1px solid var(--v3-border);
  border-radius: 10px;
  background: white;
  min-height: 42px;
  align-items: center;
}
.tag-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--v3-primary-light);
  color: var(--v3-primary);
  font-size: 0.74rem; font-weight: 600;
  padding: 4px 4px 4px 10px;
  border-radius: 999px;
}
.tag-chip-x {
  border: 0; background: rgba(0,0,0,0.08);
  width: 16px; height: 16px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--v3-primary);
}
.tag-input {
  flex: 1; min-width: 60px;
  border: 0; background: transparent;
  outline: none;
  font-family: inherit;
  font-size: 0.82rem;
}

.upload-actions {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1px solid var(--v3-border);
  padding: 10px 14px 16px;
  display: flex; gap: 8px;
  z-index: 100;
}
.upload-btn {
  flex: 1;
  padding: 13px;
  border-radius: 14px;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  border: 0;
}
.upload-btn.secondary {
  background: var(--v3-dim-white);
  color: var(--v3-text);
}
.upload-btn.primary {
  background: var(--v3-primary);
  color: white;
  flex: 2;
}

.detail-header {
  display: flex;
  align-items: center;
  height: 52px;
  padding: 0 4px;
  background: white;
  border-bottom: 1px solid var(--v3-border);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="nav-stack">

      <div class="nav-page list" style="display: flex; flex-direction: column;">
        <div class="detail-header">
          <button class="detail-back">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            <span>파일</span>
          </button>
          <div class="detail-title">파일 업로드</div>
        </div>

        <div class="upload-scroll">
          <!-- Dropzone (has file selected) -->
          <div class="dropzone has-file pop-up">
            <div class="file-preview">
              <div class="file-preview-icon pdf">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
              </div>
              <div class="file-preview-info">
                <div class="file-preview-name">박서연_A라1형_계약서.pdf</div>
                <div class="file-preview-meta">248 KB · PDF</div>
              </div>
              <button class="file-preview-remove">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div class="upload-progress"><div class="upload-progress-bar"></div></div>
            <div class="upload-progress-meta">
              <span>업로드 중...</span>
              <span>168KB / 248KB · 68%</span>
            </div>
          </div>

          <!-- Or: Empty dropzone (alternate state, shown when no file) -->
          <div class="dropzone" style="display: none;">
            <div class="dropzone-icon">
              <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <div class="dropzone-title">파일을 선택하거나 끌어다 놓으세요</div>
            <div class="dropzone-sub"><b>탭하여 파일 선택</b> · 최대 20MB<br/>PDF, JPG, PNG, DOCX, XLSX 지원</div>
          </div>

          <!-- Category -->
          <div class="form-card pop-up" style="animation-delay: 60ms;">
            <div class="form-row">
              <label class="form-label">카테고리 <span class="req">*</span></label>
              <div class="category-grid">
                <button class="category-chip selected" type="button">
                  <div class="category-chip-icon" style="background: var(--v3-burgundy-light); color: var(--v3-burgundy);">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
                  </div>
                  계약서
                </button>
                <button class="category-chip" type="button">
                  <div class="category-chip-icon" style="background: var(--v3-green-light); color: var(--v3-green);">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-4.5-4.5L5 22"/></svg>
                  </div>
                  사진
                </button>
                <button class="category-chip" type="button">
                  <div class="category-chip-icon" style="background: hsl(137, 50%, 92%); color: hsl(137, 60%, 28%);">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h2M14 13h2M8 17h2M14 17h2"/></svg>
                  </div>
                  견적서
                </button>
                <button class="category-chip" type="button">
                  <div class="category-chip-icon" style="background: var(--v3-dim-white); color: var(--v3-text-muted);">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
                  </div>
                  기타
                </button>
              </div>
            </div>
          </div>

          <!-- Related customer -->
          <div class="form-card pop-up" style="animation-delay: 120ms;">
            <div class="form-row">
              <label class="form-label">관련 고객</label>
              <input class="form-input filled" value="박서연" placeholder="고객 이름 검색 (선택)" />
              <div class="form-helper">고객 상세 페이지에서도 이 파일을 볼 수 있습니다.</div>
            </div>
            <div class="form-row">
              <label class="form-label">파일명</label>
              <input class="form-input filled" value="박서연_A라1형_계약서" />
              <div class="form-helper">확장자 (.pdf) 는 자동으로 추가됩니다.</div>
            </div>
          </div>

          <!-- Description -->
          <div class="form-card pop-up" style="animation-delay: 180ms;">
            <div class="form-row">
              <label class="form-label">설명</label>
              <textarea class="form-textarea" placeholder="파일에 대한 간단한 설명 (선택)">박서연 고객 A라1형 산모도우미 서비스 계약서. eformsign 발송 완료본.</textarea>
            </div>
          </div>

          <!-- Tags -->
          <div class="form-card pop-up" style="animation-delay: 240ms;">
            <div class="form-row">
              <label class="form-label">태그</label>
              <div class="tag-input-wrap">
                <span class="tag-chip">계약서 <button class="tag-chip-x">×</button></span>
                <span class="tag-chip">A라1형 <button class="tag-chip-x">×</button></span>
                <span class="tag-chip">박서연 <button class="tag-chip-x">×</button></span>
                <input class="tag-input" placeholder="태그 추가..." />
              </div>
              <div class="form-helper">엔터 또는 쉼표로 태그를 추가하세요.</div>
            </div>
          </div>
        </div>

        <div class="upload-actions">
          <button class="upload-btn secondary">취소</button>
          <button class="upload-btn primary">업로드 완료</button>
        </div>
      </div>

    </div>
  </div>
</div>
<div class="variant-label">파일 업로드 · /files/upload</div>
<script>
document.querySelectorAll('.category-chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.category-chip').forEach(x=>x.classList.remove('selected'));
  c.classList.add('selected');
}));
function attachRemove(btn){
  btn.addEventListener('click',(e)=>{
    e.preventDefault();
    btn.parentElement.remove();
  });
}
document.querySelectorAll('.tag-chip-x').forEach(attachRemove);
const tagInput=document.querySelector('.tag-input');
if(tagInput){
  tagInput.addEventListener('keydown',(e)=>{
    if((e.key==='Enter'||e.key===',')&&tagInput.value.trim()){
      e.preventDefault();
      const chip=document.createElement('span');
      chip.className='tag-chip';
      chip.appendChild(document.createTextNode(tagInput.value.trim()+' '));
      const x=document.createElement('button');
      x.className='tag-chip-x';
      x.textContent='×';
      attachRemove(x);
      chip.appendChild(x);
      tagInput.parentElement.insertBefore(chip,tagInput);
      tagInput.value='';
    }
  });
}
</script>
</body>
</html>
