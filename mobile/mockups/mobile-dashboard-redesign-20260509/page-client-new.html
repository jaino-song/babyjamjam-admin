<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>새 고객 추가 — Mobile Page</title>
<link rel="stylesheet" href="_shared.css?v=frame-removal" />
<link rel="stylesheet" href="_shell.css" />
<style>
.wizard-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  background: var(--v3-dim-white);
}

/* Top — progress bar + step counter */
.wizard-header {
  background: white;
  padding: 12px 16px 14px;
  border-bottom: 1px solid var(--v3-border);
  flex-shrink: 0;
}
.wizard-progress-row {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.wizard-progress-track {
  flex: 1;
  height: 6px;
  border-radius: 999px;
  background: var(--v3-bg-subtle);
  overflow: hidden;
}
.wizard-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--v3-primary), hsl(214, 100%, 50%));
  border-radius: 999px;
  transition: width 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.wizard-step-count {
  font-size: 0.6rem; font-weight: 800;
  color: var(--v3-text-muted);
  letter-spacing: 0.06em;
  font-variant-numeric: tabular-nums;
}
.wizard-step-count .current { color: var(--v3-primary); }
.wizard-step-title {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--v3-dark);
  margin-bottom: 4px;
}
.wizard-step-desc {
  font-size: 0.72rem;
  color: var(--v3-text-muted);
  line-height: 1.4;
}

/* Summary pills */
.summary-pills {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 10px 16px 12px;
  background: white;
  border-bottom: 1px solid var(--v3-border);
  flex-shrink: 0;
}
.summary-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.68rem; font-weight: 700;
  background: var(--v3-green-light); color: var(--v3-green);
  padding: 4px 10px;
  border-radius: 999px;
}
.summary-pill::before {
  content: '✓';
  font-size: 0.62rem; font-weight: 900;
}

/* Form scroll area */
.form-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 100px;
}
.form-card {
  background: white;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.form-card-title {
  font-size: 0.7rem; font-weight: 700;
  color: var(--v3-text-muted);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin: 0 0 12px;
  display: flex; align-items: center; gap: 6px;
}
.auto-badge {
  font-size: 0.55rem; font-weight: 800;
  background: var(--v3-green-light); color: var(--v3-green);
  padding: 2px 6px; border-radius: 4px;
  text-transform: none; letter-spacing: 0;
}

.form-row { margin-bottom: 14px; }
.form-row:last-child { margin-bottom: 0; }
.form-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--v3-text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.form-label .req { color: var(--v3-burgundy); margin-left: 2px; }

.form-input {
  width: 100%;
  padding: 13px 14px;
  border: 1.5px solid var(--v3-border);
  border-radius: 12px;
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--v3-dark);
  background: white;
  outline: none;
  box-sizing: border-box;
}
.form-input:focus { border-color: var(--v3-primary); }
.form-input::placeholder { color: var(--v3-text-muted); opacity: 0.6; }
.form-input[disabled] { background: var(--v3-bg-subtle); opacity: 0.55; cursor: not-allowed; }

.form-helper {
  font-size: 0.66rem;
  color: var(--v3-text-muted);
  margin-top: 5px;
}
.form-helper.ok { color: var(--v3-green); font-weight: 600; }
.form-helper.err { color: var(--v3-burgundy); font-weight: 600; }
.form-helper.pending { color: var(--v3-primary); }

/* Select with chevron */
.select-wrap { position: relative; }
.select-wrap .form-input {
  appearance: none; -webkit-appearance: none; -moz-appearance: none;
  padding-right: 38px;
  cursor: pointer;
}
.select-wrap .chev {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  width: 16px; height: 16px;
  pointer-events: none;
  color: var(--v3-text-muted);
}
.select-wrap.disabled .chev { opacity: 0.4; }

/* Currency input */
.price-input { position: relative; }
.price-input .form-input { padding-right: 32px; text-align: right; font-variant-numeric: tabular-nums; }
.price-input .currency {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.8rem; color: var(--v3-text-muted);
  pointer-events: none;
}

/* Toggle chips */
.toggle-chip-row { display: flex; flex-wrap: wrap; gap: 7px; }
.toggle-chip {
  padding: 9px 14px;
  border: 1.5px solid var(--v3-border);
  border-radius: 999px;
  background: white;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--v3-text);
  cursor: pointer;
  font-family: inherit;
}
.toggle-chip.selected {
  background: var(--v3-primary);
  border-color: var(--v3-primary);
  color: white;
}

/* Status chips */
.status-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.status-chip {
  padding: 11px 8px;
  border: 1.5px solid var(--v3-border);
  border-radius: 12px;
  background: white;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--v3-text);
  text-align: center;
  cursor: pointer;
}
.status-chip.selected {
  background: var(--v3-primary);
  border-color: var(--v3-primary);
  color: white;
}

/* Step view toggle */
.wizard-step-view { display: none; }
.wizard-step-view.active { display: block; }

/* Bottom action bar */
.wizard-actions {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: white;
  border-top: 1px solid var(--v3-border);
  padding: 12px 14px 18px;
  display: flex; gap: 8px;
  z-index: 100;
}
.wizard-btn {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  font-family: inherit;
  font-size: 0.92rem;
  font-weight: 700;
  cursor: pointer;
  border: 0;
}
.wizard-btn.secondary {
  background: var(--v3-bg-subtle);
  color: var(--v3-text);
}
.wizard-btn.primary {
  background: var(--v3-primary);
  color: white;
  flex: 2;
  box-shadow: 0 4px 14px rgba(20, 50, 100, 0.18);
}
.wizard-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="nav-stack" id="stack">

      <div class="nav-page list">
        <div class="existing-navbar">
          <button class="navbar-icon-btn" style="background: transparent;">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div style="font-size: 1rem; font-weight: 700; color: var(--v3-dark);">새 고객 추가</div>
          <button class="navbar-icon-btn" style="background: transparent;">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="wizard-content">
          <div class="wizard-header">
            <div class="wizard-progress-row">
              <div class="wizard-progress-track">
                <div class="wizard-progress-fill" id="progFill" style="width: 33%;"></div>
              </div>
              <div class="wizard-step-count"><span class="current" id="curStep">1</span> / 3 단계</div>
            </div>
            <div class="wizard-step-title" id="stepTitle">기본 정보</div>
            <div class="wizard-step-desc" id="stepDesc">고객님의 기본 정보를 입력해주세요.</div>
          </div>

          <div class="summary-pills" id="summaryPills" style="display: none;"></div>

          <!-- ============ STEP 1: 기본 정보 ============ -->
          <div class="form-scroll wizard-step-view active" data-step="1">
            <div class="form-card">
              <div class="form-row">
                <label class="form-label">이름 <span class="req">*</span></label>
                <input class="form-input" id="f-name" type="text" placeholder="홍길동" value="박서연" />
              </div>
              <div class="form-row">
                <label class="form-label">연락처 <span class="req">*</span></label>
                <input class="form-input" id="f-phone" type="tel" inputmode="numeric" maxlength="13" placeholder="010-1234-5678" value="010-2345-6789" />
                <div class="form-helper ok">✓ 사용 가능한 번호입니다.</div>
              </div>
            </div>

            <div class="form-card">
              <div class="form-row">
                <label class="form-label">생년월일</label>
                <input class="form-input" id="f-birth" type="text" inputmode="numeric" maxlength="6" placeholder="YYMMDD" value="921108" />
              </div>
              <div class="form-row">
                <label class="form-label">출산 예정일</label>
                <input class="form-input" id="f-due" type="date" value="2026-05-30" />
                <div class="form-helper">출산 예정일 또는 서비스 시작 희망일</div>
              </div>
              <div class="form-row">
                <label class="form-label">주소</label>
                <input class="form-input" id="f-addr" type="text" placeholder="서울시 강남구..." value="인천 부평구 부평대로 122" />
              </div>
            </div>
          </div>

          <!-- ============ STEP 2: 서비스 설정 ============ -->
          <div class="form-scroll wizard-step-view" data-step="2">
            <div class="form-card">
              <div class="form-card-title">바우처</div>
              <div class="form-row">
                <label class="form-label">바우처 유형</label>
                <div class="select-wrap">
                  <select class="form-input" id="f-voucher">
                    <option value="">선택하세요</option>
                    <optgroup label="단태아 첫째아">
                      <option>A가-1형</option>
                      <option>A통합-1형</option>
                      <option selected>A라-1형</option>
                    </optgroup>
                    <optgroup label="단태아 둘째아">
                      <option>A가-2형</option>
                      <option>A통합-2형</option>
                      <option>A라-2형</option>
                    </optgroup>
                    <optgroup label="단태아 셋째아">
                      <option>A가-3형</option>
                      <option>A통합-3형</option>
                      <option>A라-3형</option>
                    </optgroup>
                    <optgroup label="쌍생아·중증 단태아 (인력1)">
                      <option>B가-1형</option>
                      <option>B통합-1형</option>
                      <option>B라-1형</option>
                    </optgroup>
                    <optgroup label="쌍생아·중증 단태아 (인력2)">
                      <option>B가-2형</option>
                      <option>B통합-2형</option>
                      <option>B라-2형</option>
                    </optgroup>
                    <optgroup label="삼태아·중증 쌍태아 (인력2)">
                      <option>C가-1형</option>
                      <option>C통합-1형</option>
                      <option>C라-1형</option>
                    </optgroup>
                    <optgroup label="삼태아·중증 쌍태아 (인력3)">
                      <option>C가-2형</option>
                      <option>C통합-2형</option>
                      <option>C라-2형</option>
                    </optgroup>
                    <optgroup label="자부담">
                      <option>일반</option>
                    </optgroup>
                  </select>
                  <svg class="chev" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
              </div>
              <div class="form-row">
                <label class="form-label">기간</label>
                <div class="select-wrap">
                  <select class="form-input" id="f-duration">
                    <option value="">선택하세요</option>
                    <option>5일</option>
                    <option selected>10일</option>
                    <option>15일</option>
                  </select>
                  <svg class="chev" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
                </div>
                <div class="form-helper">바우처 유형에 따라 선택 가능한 기간이 달라집니다.</div>
              </div>
            </div>

            <div class="form-card">
              <div class="form-card-title">제공인력 배정</div>
              <div class="form-row">
                <label class="form-label">제공인력 1</label>
                <input class="form-input" id="f-emp1" type="text" placeholder="이름으로 검색..." value="김민지" />
              </div>
              <div class="form-row">
                <label class="form-label">제공인력 2</label>
                <input class="form-input" id="f-emp2" type="text" placeholder="(선택)" />
              </div>
            </div>

            <div class="form-card">
              <div class="form-card-title">요금 정보 <span class="auto-badge">자동입력</span></div>
              <div class="form-row">
                <label class="form-label">총 서비스 금액</label>
                <div class="price-input">
                  <input class="form-input" id="f-full" inputmode="numeric" value="1,280,000" />
                  <span class="currency">원</span>
                </div>
              </div>
              <div class="form-row">
                <label class="form-label">정부지원금</label>
                <div class="price-input">
                  <input class="form-input" id="f-grant" inputmode="numeric" value="896,000" />
                  <span class="currency">원</span>
                </div>
              </div>
              <div class="form-row">
                <label class="form-label">본인부담금</label>
                <div class="price-input">
                  <input class="form-input" id="f-actual" inputmode="numeric" value="384,000" />
                  <span class="currency">원</span>
                </div>
                <div class="form-helper">총 서비스 금액 − 정부지원금 = 본인부담금. 직접 수정도 가능합니다.</div>
              </div>
            </div>

            <div class="form-card">
              <div class="form-card-title">추가 옵션</div>
              <div class="toggle-chip-row">
                <button class="toggle-chip selected" type="button" data-flag="voucher">바우처 고객</button>
                <button class="toggle-chip" type="button" data-flag="care">산후조리원</button>
                <button class="toggle-chip" type="button" data-flag="pump">유축기 대여</button>
              </div>
            </div>
          </div>

          <!-- ============ STEP 3: 계약 정보 ============ -->
          <div class="form-scroll wizard-step-view" data-step="3">
            <div class="form-card">
              <div class="form-card-title">계약 상태</div>
              <div class="status-row">
                <div class="status-chip selected" data-status="대기">대기</div>
                <div class="status-chip" data-status="진행중">진행중</div>
                <div class="status-chip" data-status="완료">완료</div>
                <div class="status-chip" data-status="중단">중단</div>
                <div class="status-chip" data-status="교체 요청" style="grid-column: span 2;">교체 요청</div>
              </div>
            </div>

            <div class="form-card">
              <div class="form-card-title">서비스 기간</div>
              <div class="form-row">
                <label class="form-label">시작일</label>
                <input class="form-input" id="f-start" type="date" value="2026-05-14" />
              </div>
              <div class="form-row">
                <label class="form-label">종료일</label>
                <input class="form-input" id="f-end" type="date" value="2026-05-27" />
              </div>
            </div>

            <div style="font-size: 0.66rem; color: var(--v3-text-muted); text-align: center; padding: 8px 12px;">
              등록 시 고객에게 계약서 안내 메시지가 자동으로 전송됩니다.
            </div>
          </div>

          <div class="wizard-actions">
            <button class="wizard-btn secondary" id="prevBtn">이전</button>
            <button class="wizard-btn primary" id="nextBtn">다음 →</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div class="variant-label">새 고객 추가 · /clients/new (3-step wizard)</div>
<script>
const STEPS = [
  null,
  { title: '기본 정보', desc: '고객님의 기본 정보를 입력해주세요.' },
  { title: '서비스 설정', desc: '바우처와 제공인력, 요금 정보를 확인해주세요.' },
  { title: '계약 정보', desc: '계약 상태와 서비스 기간을 입력해주세요.' },
];
const TOTAL = 3;
let cur = 1;

function clearPills(){
  const pills = document.getElementById('summaryPills');
  while(pills.firstChild) pills.removeChild(pills.firstChild);
}

function renderSummaryPills(){
  const pills = document.getElementById('summaryPills');
  clearPills();
  if(cur === 1){
    pills.style.display = 'none';
    return;
  }
  const chips = [];
  if(cur >= 2){
    const name = document.getElementById('f-name').value.trim();
    if(name) chips.push(name);
  }
  if(cur >= 3){
    const v = document.getElementById('f-voucher').value;
    const d = document.getElementById('f-duration').value;
    const a = document.getElementById('f-actual').value;
    if(v) chips.push(v);
    if(d) chips.push(d);
    if(a) chips.push(a + '원');
  }
  if(chips.length === 0){
    pills.style.display = 'none';
    return;
  }
  pills.style.display = 'flex';
  chips.forEach(text => {
    const pill = document.createElement('span');
    pill.className = 'summary-pill';
    pill.appendChild(document.createTextNode(text));
    pills.appendChild(pill);
  });
}

function render(){
  document.querySelectorAll('.wizard-step-view').forEach(v => {
    v.classList.toggle('active', parseInt(v.dataset.step,10) === cur);
  });
  document.getElementById('progFill').style.width = (cur / TOTAL * 100) + '%';
  document.getElementById('curStep').textContent = cur;
  document.getElementById('stepTitle').textContent = STEPS[cur].title;
  document.getElementById('stepDesc').textContent = STEPS[cur].desc;
  const prev = document.getElementById('prevBtn');
  const next = document.getElementById('nextBtn');
  prev.style.opacity = cur === 1 ? '0.4' : '1';
  prev.style.pointerEvents = cur === 1 ? 'none' : 'auto';
  next.textContent = cur === TOTAL ? '✓ 등록' : '다음 →';
  renderSummaryPills();
  const scroll = document.querySelector(`.wizard-step-view[data-step="${cur}"]`);
  if(scroll) scroll.scrollTop = 0;
}

document.getElementById('nextBtn').addEventListener('click', () => {
  if(cur < TOTAL) { cur++; render(); }
});
document.getElementById('prevBtn').addEventListener('click', () => {
  if(cur > 1) { cur--; render(); }
});

document.querySelectorAll('.toggle-chip').forEach(t => t.addEventListener('click', () => {
  t.classList.toggle('selected');
}));

document.querySelectorAll('.status-chip').forEach(s => s.addEventListener('click', () => {
  document.querySelectorAll('.status-chip').forEach(x => x.classList.remove('selected'));
  s.classList.add('selected');
}));

document.getElementById('f-voucher').addEventListener('change', (e) => {
  const dur = document.getElementById('f-duration');
  const wrap = dur.closest('.select-wrap');
  if(!e.target.value){
    dur.disabled = true;
    wrap.classList.add('disabled');
  } else {
    dur.disabled = false;
    wrap.classList.remove('disabled');
  }
});

render();
</script>
</body>
</html>
