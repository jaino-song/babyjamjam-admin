<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Variant B — Stats as Filter Tabs</title>
<link rel="stylesheet" href="_shared.css" />
<style>
/* Variant B specific — stats become the filter tabs */
.filter-tabs {
  display: flex;
  gap: 6px;
  padding: 8px 12px 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-chip {
  display: flex; align-items: center; gap: 8px;
  background: white;
  border: 1px solid var(--v3-border);
  border-radius: 14px;
  padding: 10px 14px;
  flex-shrink: 0;
  cursor: pointer;
  transition: all 0.2s ease;
  font-family: inherit;
}
.filter-chip.active {
  background: var(--v3-primary);
  border-color: var(--v3-primary);
}
.filter-chip.active .chip-icon { background: rgba(255,255,255,0.2); }
.filter-chip.active .chip-icon svg { stroke: white !important; }
.filter-chip.active .chip-label { color: white; }
.filter-chip.active .chip-count { color: white; }
.chip-icon {
  width: 24px; height: 24px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.chip-text { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.1; }
.chip-label { font-size: 0.65rem; color: var(--v3-text-muted); font-weight: 600; }
.chip-count {
  font-size: 0.95rem;
  font-weight: 800;
  color: var(--v3-dark);
}
.chip-count.urgent { color: var(--v3-burgundy); }
.filter-chip.active .chip-count.urgent { color: white; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="nav-stack" id="stack">

      <div class="nav-page list">
        <div class="hero-mini">
          <h4>인천점</h4>
          <h1>송진호 님</h1>
        </div>

        <!-- Stats now ARE the filter tabs -->
        <div class="filter-tabs">
          <button class="filter-chip active">
            <div class="chip-icon" style="background: var(--v3-primary-light);">
              <svg width="14" height="14" fill="none" stroke="hsl(214,100%,34%)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            </div>
            <div class="chip-text"><span class="chip-label">진행중</span><span class="chip-count">0</span></div>
          </button>
          <button class="filter-chip">
            <div class="chip-icon" style="background: var(--v3-orange-light);">
              <svg width="14" height="14" fill="none" stroke="hsl(34,100%,55%)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M8 2v4M16 2v4"/><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18"/></svg>
            </div>
            <div class="chip-text"><span class="chip-label">시작 예정</span><span class="chip-count">1</span></div>
          </button>
          <button class="filter-chip">
            <div class="chip-icon" style="background: var(--v3-green-light);">
              <svg width="14" height="14" fill="none" stroke="hsl(137,34%,31%)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
            </div>
            <div class="chip-text"><span class="chip-label">서명 대기</span><span class="chip-count urgent">2</span></div>
          </button>
          <button class="filter-chip">
            <div class="chip-icon" style="background: var(--v3-burgundy-light);">
              <svg width="14" height="14" fill="none" stroke="hsl(355,36%,45%)" stroke-width="2.5" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"/></svg>
            </div>
            <div class="chip-text"><span class="chip-label">발송 대기</span><span class="chip-count">0</span></div>
          </button>
        </div>

        <div class="list-section">
          <div class="list-card pop-up">
            <div class="list-title">전체 현황 <span style="font-size: 0.85rem; color: var(--v3-text-muted); font-weight: 500;">3건</span></div>
            <div style="padding: 4px 8px 8px;">
              <div class="list-item" onclick="openDetail(this)" data-name="[더미] 정유진" data-type="A라2형" data-status="교체 요청" data-status-class="badge-burgundy" data-avatar="av-burgundy" data-initial="[">
                <div class="list-avatar av-burgundy">[</div>
                <div class="list-info">
                  <div class="list-name">[더미] 정유진 <span class="badge badge-burgundy">교체 요청</span></div>
                  <div class="list-meta">A라2형 · -</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="list-item" onclick="openDetail(this)" data-name="송진호" data-type="A통합2형" data-status="곧 시작" data-status-class="badge-primary" data-avatar="av-orange" data-initial="송">
                <div class="list-avatar av-orange">송</div>
                <div class="list-info">
                  <div class="list-name">송진호 <span class="badge badge-primary">곧 시작</span></div>
                  <div class="list-meta">A통합2형 · - · 5일 후</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="list-item" onclick="openDetail(this)" data-name="박서연" data-type="A라2형" data-status="진행중" data-status-class="badge-green" data-avatar="av-green" data-initial="박">
                <div class="list-avatar av-green">박</div>
                <div class="list-info">
                  <div class="list-name">박서연 <span class="badge badge-green">진행중</span></div>
                  <div class="list-meta">A라2형 · 김민지 · D+12</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="list-item" onclick="openDetail(this)" data-name="이수현" data-type="A통합2형" data-status="서명 대기" data-status-class="badge-orange" data-avatar="av-purple" data-initial="이">
                <div class="list-avatar av-purple">이</div>
                <div class="list-info">
                  <div class="list-name">이수현 <span class="badge badge-orange">서명 대기</span></div>
                  <div class="list-meta">A통합2형 · - · 2025-05-15</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="nav-page detail">
        <div class="detail-header">
          <button class="detail-back" onclick="closeDetail()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            뒤로
          </button>
          <div class="detail-title" id="d-title">상세 정보</div>
        </div>
        <div class="detail-body">
          <div class="detail-card pop-up">
            <div style="display:flex; align-items:center; gap: 14px; margin-bottom: 16px;">
              <div class="list-avatar" id="d-avatar" style="width: 56px; height: 56px; border-radius: 18px; font-size: 1.3rem;">송</div>
              <div>
                <div style="font-size: 1.05rem; font-weight: 700; color: var(--v3-dark);" id="d-name">송진호</div>
                <div style="margin-top: 6px;"><span class="badge" id="d-status">곧 시작</span></div>
              </div>
            </div>
            <h3>서비스 정보</h3>
            <div class="detail-row"><span class="detail-label">서비스 유형</span><span class="detail-value" id="d-type">A통합2형</span></div>
            <div class="detail-row"><span class="detail-label">담당 매니저</span><span class="detail-value">미배정</span></div>
            <div class="detail-row"><span class="detail-label">서비스 시작일</span><span class="detail-value">2025-05-14</span></div>
            <div class="detail-row"><span class="detail-label">서비스 기간</span><span class="detail-value">14일</span></div>
          </div>
          <div class="detail-card pop-up" style="animation-delay: 80ms;">
            <h3>다음 조치</h3>
            <div class="detail-row"><span class="detail-label">매니저 배정</span><span class="detail-value" style="color: var(--v3-burgundy);">필요</span></div>
            <div class="detail-row"><span class="detail-label">서명 문서</span><span class="detail-value">2/3 완료</span></div>
            <div class="detail-actions">
              <button class="btn btn-secondary">매니저 배정</button>
              <button class="btn btn-primary">상세 보기</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="variant-label">B · Stats-as-Filter-Tabs</div>

<script>
function openDetail(el) {
  document.getElementById('d-name').textContent = el.dataset.name;
  document.getElementById('d-type').textContent = el.dataset.type;
  document.getElementById('d-title').textContent = el.dataset.name;
  const statusEl = document.getElementById('d-status');
  statusEl.textContent = el.dataset.status;
  statusEl.className = 'badge ' + el.dataset.statusClass;
  const avEl = document.getElementById('d-avatar');
  avEl.className = 'list-avatar ' + el.dataset.avatar;
  avEl.style.cssText = 'width: 56px; height: 56px; border-radius: 18px; font-size: 1.3rem;';
  avEl.textContent = el.dataset.initial;
  document.getElementById('stack').classList.add('show-detail');
}
function closeDetail() { document.getElementById('stack').classList.remove('show-detail'); }
document.querySelectorAll('.filter-chip').forEach(c => c.addEventListener('click', e => {
  document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
}));
</script>
</body>
</html>
