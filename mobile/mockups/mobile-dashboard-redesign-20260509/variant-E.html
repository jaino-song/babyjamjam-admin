<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Variant E — Floating Stat Dock</title>
<link rel="stylesheet" href="_shared.css?v=frame-removal" />
<style>
/* Variant E specific — sticky compact hero, floating bottom dock */
.hero-mini { padding: 14px 18px; border-radius: 0; }
.hero-mini h4 { font-size: 0.7rem; }
.hero-mini h1 { font-size: 1.1rem; }

.stat-dock {
  position: absolute;
  bottom: 14px; left: 14px; right: 14px;
  background: rgba(20, 24, 40, 0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 22px;
  padding: 10px;
  display: flex;
  gap: 4px;
  z-index: 5;
  box-shadow: 0 16px 50px rgba(0,0,0,0.25);
}
.dock-btn {
  flex: 1;
  background: transparent;
  border: 0;
  border-radius: 16px;
  padding: 8px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s ease;
  position: relative;
}
.dock-btn:hover { background: rgba(255,255,255,0.08); }
.dock-btn.active { background: rgba(255,255,255,0.15); }
.dock-icon {
  width: 32px; height: 32px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.dock-count {
  position: absolute;
  top: -3px; right: -3px;
  min-width: 16px; height: 16px;
  background: var(--v3-burgundy);
  color: white;
  font-size: 0.6rem;
  font-weight: 800;
  border-radius: 999px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 4px;
  border: 2px solid rgb(20, 24, 40);
}
.dock-count.zero { display: none; }
.dock-label {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.7);
  font-weight: 600;
}
.dock-btn.active .dock-label { color: white; }

.list-section {
  padding-bottom: 100px; /* room for floating dock */
}
</style>
</head>
<body>
<div class="phone-frame">
  <div class="phone-notch"></div>
  <div class="phone-screen">
    <div class="nav-stack" id="stack">

      <div class="nav-page list">
        <div class="hero-mini">
          <h4>인천점</h4>
          <h1>송진호 님 · 안녕하세요</h1>
        </div>

        <div class="list-section">
          <div class="list-card pop-up" style="margin-top: 12px;">
            <div class="list-title">최근 현황 <span style="font-size: 0.7rem; color: var(--v3-text-muted); font-weight: 500;">진행중 · 0건</span></div>
            <div style="padding: 4px 8px 8px;">
              <div class="list-item" onclick="openDetail(this)" data-name="[더미] 정유진" data-type="A라2형" data-status="교체 요청" data-status-class="badge-burgundy" data-avatar="av-burgundy" data-initial="[">
                <div class="list-avatar av-burgundy">[</div>
                <div class="list-info">
                  <div class="list-name">[더미] 정유진 <span class="badge badge-burgundy">교체 요청</span></div>
                  <div class="list-meta">A라2형 · -</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="list-item" onclick="openDetail(this)" data-name="송진호" data-type="A통합2형" data-status="곧 시작" data-status-class="badge-primary" data-avatar="av-orange" data-initial="송">
                <div class="list-avatar av-orange">송</div>
                <div class="list-info">
                  <div class="list-name">송진호 <span class="badge badge-primary">곧 시작</span></div>
                  <div class="list-meta">A통합2형 · - · 5일 후</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="list-item" onclick="openDetail(this)" data-name="박서연" data-type="A라2형" data-status="진행중" data-status-class="badge-green" data-avatar="av-green" data-initial="박">
                <div class="list-avatar av-green">박</div>
                <div class="list-info">
                  <div class="list-name">박서연 <span class="badge badge-green">진행중</span></div>
                  <div class="list-meta">A라2형 · 김민지 · D+12</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="list-item" onclick="openDetail(this)" data-name="이수현" data-type="A통합2형" data-status="서명 대기" data-status-class="badge-orange" data-avatar="av-purple" data-initial="이">
                <div class="list-avatar av-purple">이</div>
                <div class="list-info">
                  <div class="list-name">이수현 <span class="badge badge-orange">서명 대기</span></div>
                  <div class="list-meta">A통합2형 · - · 2025-05-15</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
              <div class="list-item" onclick="openDetail(this)" data-name="김도윤" data-type="B형" data-status="진행중" data-status-class="badge-green" data-avatar="av-primary" data-initial="김">
                <div class="list-avatar av-primary">김</div>
                <div class="list-info">
                  <div class="list-name">김도윤 <span class="badge badge-green">진행중</span></div>
                  <div class="list-meta">B형 · 박지민 · D+8</div>
                </div>
                <svg class="list-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Floating dock (always visible) -->
        <div class="stat-dock">
          <button class="dock-btn active">
            <div class="dock-icon" style="background: var(--v3-primary-light);">
              <svg width="16" height="16" fill="none" stroke="hsl(214,100%,34%)" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/></svg>
              <span class="dock-count zero">0</span>
            </div>
            <div class="dock-label">진행중</div>
          </button>
          <button class="dock-btn">
            <div class="dock-icon" style="background: var(--v3-orange-light);">
              <svg width="16" height="16" fill="none" stroke="hsl(34,100%,55%)" stroke-width="2.5" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>
              <span class="dock-count">1</span>
            </div>
            <div class="dock-label">시작예정</div>
          </button>
          <button class="dock-btn">
            <div class="dock-icon" style="background: var(--v3-green-light);">
              <svg width="16" height="16" fill="none" stroke="hsl(137,34%,31%)" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
              <span class="dock-count">2</span>
            </div>
            <div class="dock-label">서명대기</div>
          </button>
          <button class="dock-btn">
            <div class="dock-icon" style="background: var(--v3-burgundy-light);">
              <svg width="16" height="16" fill="none" stroke="hsl(355,36%,45%)" stroke-width="2.5" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"/></svg>
              <span class="dock-count zero">0</span>
            </div>
            <div class="dock-label">발송대기</div>
          </button>
        </div>
      </div>

      <div class="nav-page detail">
        <div class="detail-header">
          <button class="detail-back" onclick="closeDetail()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
            뒤로
          </button>
          <div class="detail-title" id="d-title">상세 정보</div>
        </div>
        <div class="detail-body">
          <div class="detail-card pop-up">
            <div style="display:flex; align-items:center; gap: 14px; margin-bottom: 16px;">
              <div class="list-avatar" id="d-avatar" style="width: 56px; height: 56px; border-radius: 18px; font-size: 1.3rem;">송</div>
              <div>
                <div style="font-size: 1.05rem; font-weight: 700; color: var(--v3-dark);" id="d-name">송진호</div>
                <div style="margin-top: 6px;"><span class="badge" id="d-status">곧 시작</span></div>
              </div>
            </div>
            <h3>서비스 정보</h3>
            <div class="detail-row"><span class="detail-label">서비스 유형</span><span class="detail-value" id="d-type">A통합2형</span></div>
            <div class="detail-row"><span class="detail-label">담당 매니저</span><span class="detail-value">미배정</span></div>
            <div class="detail-row"><span class="detail-label">서비스 시작일</span><span class="detail-value">2025-05-14</span></div>
          </div>
          <div class="detail-card pop-up" style="animation-delay: 80ms;">
            <h3>다음 조치</h3>
            <div class="detail-row"><span class="detail-label">매니저 배정</span><span class="detail-value" style="color: var(--v3-burgundy);">필요</span></div>
            <div class="detail-actions">
              <button class="btn btn-secondary">매니저 배정</button>
              <button class="btn btn-primary">상세 보기</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<div class="variant-label">E · Floating Stat Dock + iOS Push</div>
<script>
function openDetail(el) {
  document.getElementById('d-name').textContent = el.dataset.name;
  document.getElementById('d-type').textContent = el.dataset.type;
  document.getElementById('d-title').textContent = el.dataset.name;
  const statusEl = document.getElementById('d-status');
  statusEl.textContent = el.dataset.status;
  statusEl.className = 'badge ' + el.dataset.statusClass;
  const avEl = document.getElementById('d-avatar');
  avEl.className = 'list-avatar ' + el.dataset.avatar;
  avEl.style.cssText = 'width: 56px; height: 56px; border-radius: 18px; font-size: 1.3rem;';
  avEl.textContent = el.dataset.initial;
  document.getElementById('stack').classList.add('show-detail');
}
function closeDetail() { document.getElementById('stack').classList.remove('show-detail'); }
document.querySelectorAll('.dock-btn').forEach(b => b.addEventListener('click', e => {
  document.querySelectorAll('.dock-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
}));
</script>
</body>
</html>
