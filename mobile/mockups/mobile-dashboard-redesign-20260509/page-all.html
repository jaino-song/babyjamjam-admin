<style>
/* No list pattern — menu/cards layout */
.menu-content {
  flex: 1;
  overflow-y: auto;
  padding: 14px 14px 96px; /* extra bottom for floating nav */
  display: flex; flex-direction: column;
  gap: 14px;
  scrollbar-width: none;
}
.menu-content::-webkit-scrollbar { display: none; }

/* Profile card */
.profile-card {
  background: linear-gradient(135deg, var(--v3-primary), hsl(267, 50%, 46%));
  color: white;
  border-radius: 16px;
  padding: 12px 14px;
  box-shadow: var(--shadow-v3);
  display: flex; align-items: center; gap: 10px;
  position: relative;
  overflow: hidden;
  flex-shrink: 0; /* prevent the column-flex parent from squishing it */
}
.profile-card::after {
  content: '';
  position: absolute;
  right: -30px; bottom: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  filter: blur(20px);
}
.profile-avatar {
  width: 36px; height: 36px;
  border-radius: 11px;
  background: rgba(255,255,255,0.22);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  font-weight: 800;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}
.profile-info { flex: 1; min-width: 0; position: relative; z-index: 1; line-height: 1.1; }
.profile-name { font-size: 0.95rem; font-weight: 700; }
.profile-role {
  font-size: 0.62rem; opacity: 0.85;
  margin-top: 3px;
  display: flex; align-items: center; gap: 5px;
  font-weight: 600;
}
.profile-role .role-dot {
  width: 3px; height: 3px;
  background: rgba(255,255,255,0.7);
  border-radius: 50%;
}
.profile-edit {
  background: rgba(255,255,255,0.18);
  border: 1px solid rgba(255,255,255,0.25);
  color: white;
  padding: 5px 7px;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  position: relative;
  z-index: 1;
  display: flex; align-items: center; justify-content: center;
}

/* iOS plain-list menu groups — no card chrome, rows sit directly on page bg */
.menu-group { /* transparent group container */ }
.menu-group-title {
  padding: 10px 18px 4px;
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--v3-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.menu-row {
  display: flex; align-items: center; gap: 14px;
  padding: 12px 16px;
  cursor: pointer;
  transition: background 0.15s ease;
  border-top: 1px solid var(--v3-border);
  border-radius: 8px;
  color: inherit;
  text-decoration: none;
}
.menu-row:first-of-type { border-top: 0; }
.menu-row:hover { background: rgba(255,255,255,0.6); }
.menu-icon {
  width: 36px; height: 36px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.menu-text { flex: 1; min-width: 0; }
.menu-label { font-size: 0.88rem; font-weight: 600; color: var(--v3-dark); }
.menu-right {
  display: flex; align-items: center; gap: 6px;
  color: var(--v3-text-muted);
}
.menu-badge {
  background: var(--v3-burgundy);
  color: white;
  font-size: 0.6rem;
  font-weight: 800;
  padding: 2px 7px;
  border-radius: 999px;
}
.menu-value {
  font-size: 0.78rem;
  color: var(--v3-text-muted);
  font-weight: 600;
}

/* Logout button */
.logout-btn {
  width: 100%;
  background: white;
  border: 1px solid var(--v3-border);
  color: var(--v3-burgundy);
  padding: 14px;
  border-radius: 18px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  box-shadow: var(--shadow-v3);
}
.app-version {
  text-align: center;
  font-size: 0.65rem;
  color: var(--v3-text-muted);
  padding: 8px 0;
}
</style>

<script>
function toggleNotif(e){e.stopPropagation();const p=document.getElementById('notifPopover'),b=document.getElementById('notifBackdrop'),bell=document.getElementById('bellBtn');const o=p.classList.toggle('open');b.classList.toggle('open',o);bell.classList.toggle('notif-active',o);}
function closeNotif(){document.getElementById('notifPopover').classList.remove('open');document.getElementById('notifBackdrop').classList.remove('open');document.getElementById('bellBtn').classList.remove('notif-active');}
function markAllRead(e){e.stopPropagation();document.querySelectorAll('.notif-item.unread').forEach(el=>{el.classList.remove('unread');const d=el.querySelector('.unread-dot');if(d)d.remove();});const p=document.querySelector('.notif-count-pill');if(p)p.style.display='none';const bd=document.querySelector('#bellBtn .dot');if(bd)bd.style.display='none';}
</script>
